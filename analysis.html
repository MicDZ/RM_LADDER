<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Ladder — 热力图</title>
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Design Tokens ── */
:root {
  --canvas-night: #000000;
  --canvas-night-soft: #0a0a0a;
  --canvas-light: #ffffff;
  --hairline-on-dark: #3a3a3f;
  --on-primary: #ffffff;
  --ink-mute: #5a5a5f;
  --font-display: 'D-DIN-Bold', 'Arial Narrow', Arial, Verdana, sans-serif;
  --font-body: 'D-DIN', Arial, Verdana, sans-serif;
  --sp-xs: 8px;
  --sp-sm: 12px;
  --sp-md: 16px;
  --sp-xl: 24px;
  --sp-xxl: 32px;
  --sp-huge: 48px;
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-pill: 32px;
}

/* ── Base ── */
html { scroll-behavior: smooth; }
body {
  background: var(--canvas-night);
  color: var(--on-primary);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-xl) var(--sp-xxl);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--hairline-on-dark);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.nav-links { display: flex; gap: var(--sp-xl); }
.nav-links a {
  color: var(--on-primary);
  text-decoration: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.17px;
  text-transform: uppercase;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.nav-links a:hover, .nav-links a.active { opacity: 1; }

/* ── Hero ── */
.hero {
  padding: 160px var(--sp-xxl) var(--sp-huge);
  text-align: center;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 80px);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: 1.6px;
}
.hero p {
  margin-top: var(--sp-xl);
  color: var(--ink-mute);
  font-size: 16px;
}

/* ── Container ── */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--sp-xxl);
}

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-sm);
  padding: var(--sp-xl) 0;
  align-items: center;
}
.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-xs);
}
.filter-label {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.96px;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-right: var(--sp-xs);
  display: flex;
  align-items: center;
  min-width: 60px;
}

/* ── Ghost Pill Buttons ── */
.pill {
  display: inline-block;
  padding: 8px 18px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.17px;
  text-transform: uppercase;
  color: var(--on-primary);
  background: var(--canvas-night);
  border: 1px solid var(--on-primary);
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.pill:hover { background: rgba(255,255,255,0.08); }
.pill.active {
  background: var(--on-primary);
  color: var(--canvas-night);
}

/* ── Section Headers ── */
.section-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: 0.96px;
  text-transform: uppercase;
  margin: var(--sp-huge) 0 var(--sp-xl);
}
.section-subtitle {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 1.32px;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 0 0 var(--sp-md);
  padding-bottom: var(--sp-sm);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ── Heatmap Container ── */
.heatmap-wrapper {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto var(--sp-huge);
  background: var(--canvas-night-soft);
  border: 1px solid var(--hairline-on-dark);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.heatmap-container {
  position: relative;
  width: 100%;
  /* Match image aspect ratio: 2190x1202 */
  aspect-ratio: 2190/1202;
}
.field-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.heatmap-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* ── School Selector ── */
.school-scroll {
  max-height: 180px;
  overflow-y: auto;
  background: var(--canvas-night-soft);
  border: 1px solid var(--hairline-on-dark);
  border-radius: var(--radius-xs);
  padding: var(--sp-sm);
  margin-bottom: var(--sp-xl);
}
.school-scroll::-webkit-scrollbar {
  width: 6px;
}
.school-scroll::-webkit-scrollbar-track {
  background: var(--canvas-night);
}
.school-scroll::-webkit-scrollbar-thumb {
  background: var(--hairline-on-dark);
  border-radius: 3px;
}

/* ── Legend ── */
.legend {
  text-align: center;
  color: var(--ink-mute);
  font-size: 13px;
  margin-bottom: var(--sp-xl);
}
.legend-bar {
  display: inline-block;
  width: 20px;
  height: 12px;
  background: linear-gradient(to right, rgba(0,0,255,0.3), rgba(0,255,0,0.5), rgba(255,255,0,0.7), rgba(255,0,0,0.9));
  vertical-align: middle;
  margin-right: 8px;
}

/* ── Footer ── */
.footer {
  margin-top: var(--sp-huge);
  padding: var(--sp-xxl);
  border-top: 1px solid var(--hairline-on-dark);
  text-align: center;
  color: var(--ink-mute);
  font-size: 13px;
}

/* ── Responsive ── */
@media (max-width: 960px) {
  .section-title { font-size: 36px; }
}
@media (max-width: 600px) {
  .nav-links { display: none; }
  .hero h1 { font-size: 36px; }
  .section-title { font-size: 28px; }
  .filter-group { gap: var(--sp-xs); }
  .pill { padding: 6px 12px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">RM LADDER</div>
  <div class="nav-links">
    <a href="index.html">天梯榜</a>
    <a href="analysis.html" class="active">热力图</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>热力图</h1>
  <p>RMUC 2026 区域赛位置分布与事件统计</p>
</section>

<!-- Main Content -->
<div class="container">

  <div class="section-subtitle">场地数据分析</div>
  <h2 class="section-title">热力图</h2>

  <!-- Filters -->
  <div class="filter-bar">
    <span class="filter-label">类型</span>
    <div class="filter-group" id="type-filters">
      <button class="pill active" data-type="position">位置热力图</button>
      <button class="pill" data-type="attack">进攻热力图</button>
      <button class="pill" data-type="damage">受击热力图</button>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">赛区</span>
    <div class="filter-group" id="region-filters">
      <button class="pill active" data-region="all">全部赛区</button>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">学校</span>
  </div>
  <div class="school-scroll" id="school-scroll">
    <div class="filter-group" id="school-filters">
      <button class="pill active" data-school="all">全部学校</button>
    </div>
  </div>

  <div class="filter-bar" id="robot-filter-bar">
    <span class="filter-label">兵种</span>
    <div class="filter-group" id="robot-filters">
      <button class="pill active" data-robot="all">全部</button>
      <button class="pill" data-robot="英雄">英雄</button>
      <button class="pill" data-robot="工程">工程</button>
      <button class="pill" data-robot="步兵" id="btn-infantry">步兵</button>
      <button class="pill" data-robot="无人机">无人机</button>
      <button class="pill" data-robot="哨兵">哨兵</button>
      <button class="pill" data-robot="雷达">雷达</button>
    </div>
    <div class="filter-group" id="infantry-sub" style="display:none;margin-left:8px">
      <button class="pill active" data-sub="合并">合并</button>
      <button class="pill" data-sub="步兵3">3号</button>
      <button class="pill" data-sub="步兵4">4号</button>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">显示</span>
    <div class="filter-group" id="side-filters">
      <button class="pill active" data-side="all">双边</button>
      <button class="pill" data-side="red">统一红方</button>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="heatmap-wrapper">
    <div class="heatmap-container" id="heatmap-container">
      <img src="static/map/26UC.jpg" alt="RMUC 2026 场地" class="field-image" id="field-image">
      <canvas id="heatmap-canvas" class="heatmap-canvas"></canvas>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span class="legend-bar"></span>
    低频 → 高频 &nbsp;|&nbsp; X(0~28) Y(0~15)
  </div>

</div>

<!-- Footer -->
<footer class="footer">
  <p>RM LADDER — ROBOMASTER 天梯榜 &copy; 2026</p>
</footer>

<script>
// ── Global State ──
let heatmapData = null;
let currentHeatmapType = 'position'; // 'position', 'attack', 'damage'
let currentRegion = 'all';
let currentRobot = 'all';
let currentInfantrySub = '合并'; // '合并', '步兵3', '步兵4'
let currentSchool = 'all';
let currentSide = 'all'; // 'all' = bilateral, 'red' = unified red side
let canvas, ctx;

// Map display robot names to data keys
function getRobotDataKeys(robot) {
  if (robot === 'all') return null; // null means all
  if (currentHeatmapType === 'position') {
    // Position heatmap uses different keys
    if (robot === '无人机') return ['空中'];
    if (robot === '雷达') return ['易伤'];
    if (robot === '步兵') {
      if (currentInfantrySub === '合并') return ['步兵3', '步兵4'];
      return [currentInfantrySub]; // '步兵3' or '步兵4'
    }
    return [robot]; // 英雄, 工程, 哨兵
  } else {
    // Attack/damage heatmaps: 步兵 merged, no 雷达/易伤
    if (robot === '无人机') return ['空中'];
    if (robot === '雷达') return []; // no radar data for attack/damage
    if (robot === '步兵') return ['步兵'];
    return [robot]; // 英雄, 工程, 哨兵
  }
}

// ── Field mapping constants ──
// Game coordinates: x(0~28), y(0~15)
// Image is 2190x1202 pixels
// Need to find where game area maps to in the image
const FIELD_MAP = {
  // Game coordinate bounds
  gameXMin: 0,
  gameXMax: 28,
  gameYMin: 0,
  gameYMax: 15,
  // Pixel bounds of the play area in the image (calibrated via test grid)
  pixelXMin: 80,    // Left edge of play area
  pixelXMax: 2110,  // Right edge of play area
  pixelYMin: 55,    // Top edge of play area
  pixelYMax: 1145,  // Bottom edge of play area
  imageWidth: 2190,
  imageHeight: 1202
};

// ── School data cache ──
const schoolDataCache = {};

function decodeGrid(encoded) {
  // 空字符串或无效值 → 全零网格
  if (!encoded || typeof encoded !== 'string' || encoded.length === 0) {
    return Array.from({ length: 60 }, () => Array(60).fill(0));
  }
  // 稀疏格式: "idx:val,idx:val,..."
  if (encoded.includes(':')) {
    const grid = Array.from({ length: 60 }, () => Array(60).fill(0));
    const pairs = encoded.split(',');
    for (const pair of pairs) {
      if (!pair) continue;
      const [idx, val] = pair.split(':').map(Number);
      const y = Math.floor(idx / 60);
      const x = idx % 60;
      grid[y][x] = val;
    }
    return grid;
  }
  // base64格式
  const bin = atob(encoded);
  const grid = [];
  for (let y = 0; y < 60; y++) {
    const row = [];
    for (let x = 0; x < 60; x++) {
      row.push(bin.charCodeAt(y * 60 + x) || 0);
    }
    grid.push(row);
  }
  return grid;
}

function decodeRobotData(encoded) {
  if (typeof encoded === 'string') return decodeGrid(encoded);
  if (encoded && encoded.red) return { red: decodeGrid(encoded.red), blue: decodeGrid(encoded.blue) };
  return encoded;
}

function decodeSchoolData(raw) {
  const decoded = {};
  for (const [rtype, data] of Object.entries(raw)) {
    decoded[rtype] = decodeRobotData(data);
  }
  return decoded;
}

async function loadSchoolData(region, school, robotType) {
  const isAll = school === '_all';
  const cacheKey = `${currentHeatmapType}/${region}/${school}/${robotType || 'all'}`;
  if (schoolDataCache[cacheKey]) return schoolDataCache[cacheKey];
  try {
    let url;
    if (currentHeatmapType === 'position') {
      url = isAll
        ? `static/heatmap/${encodeURIComponent(region)}/_all.json`
        : `static/heatmap/${encodeURIComponent(region)}/${encodeURIComponent(school)}.json`;
    } else {
      const suffix = currentHeatmapType === 'attack' ? '_attack' : '_damage';
      const typePart = robotType ? `_${encodeURIComponent(robotType)}` : '';
      url = isAll
        ? `static/heatmap/${encodeURIComponent(region)}/_all${suffix}${typePart}.json`
        : `static/heatmap/${encodeURIComponent(region)}/${encodeURIComponent(school)}${suffix}${typePart}.json`;
    }
    const res = await fetch(url);
    if (!res.ok) return null;
    const raw = await res.json();
    const data = currentHeatmapType === 'position' ? decodeSchoolData(raw) : { red: decodeGrid(raw.red), blue: decodeGrid(raw.blue) };
    schoolDataCache[cacheKey] = data;
    return data;
  } catch { return null; }
}

async function getSchoolsForRegion(region) {
  if (!heatmapData || !heatmapData.config.regionSchools) return [];
  return heatmapData.config.regionSchools[region] || [];
}

// ── Load Data ──
async function loadData() {
  try {
    const res = await fetch('static/heatmap/config.json');
    const config = await res.json();
    heatmapData = { config, data: {} };

    initCanvas();
    initFilters();
    renderHeatmap();
  } catch (error) {
    console.error('Failed to load data:', error);
  }
}

// ── Initialize Canvas ──
function initCanvas() {
  canvas = document.getElementById('heatmap-canvas');
  ctx = canvas.getContext('2d');

  const fieldImage = document.getElementById('field-image');

  function initAfterImageLoad() {
    resizeCanvas();
    renderHeatmap();
  }

  fieldImage.onload = initAfterImageLoad;

  if (fieldImage.complete) {
    initAfterImageLoad();
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    renderHeatmap();
  });
}

function resizeCanvas() {
  const container = document.getElementById('heatmap-container');
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}

// ── Convert game coordinates to canvas pixels ──
function gameToPixel(gameX, gameY) {
  const { gameXMin, gameXMax, gameYMin, gameYMax,
          pixelXMin, pixelXMax, pixelYMin, pixelYMax,
          imageWidth, imageHeight } = FIELD_MAP;

  // Normalize game coordinates to 0-1
  const normX = (gameX - gameXMin) / (gameXMax - gameXMin);
  const normY = (gameY - gameYMin) / (gameYMax - gameYMin);

  // Map to pixel coordinates
  // Note: Y is inverted (game y increases upward, image y increases downward)
  const pixelX = pixelXMin + normX * (pixelXMax - pixelXMin);
  const pixelY = pixelYMax - normY * (pixelYMax - pixelYMin); // Invert Y

  // Scale to canvas size
  const scaleX = canvas.width / imageWidth;
  const scaleY = canvas.height / imageHeight;

  return {
    x: pixelX * scaleX,
    y: pixelY * scaleY
  };
}

// ── Initialize Filters ──
function initFilters() {
  if (!heatmapData) return;

  const { config, data } = heatmapData;

  // Type filters
  document.querySelectorAll('#type-filters .pill').forEach(btn => {
    btn.addEventListener('click', () => setHeatmapType(btn.dataset.type));
  });

  // Region filters
  const regionContainer = document.getElementById('region-filters');
  config.regions.forEach(region => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.region = region;
    btn.textContent = region.replace('赛区', '');
    btn.addEventListener('click', () => setRegion(region));
    regionContainer.appendChild(btn);
  });

  // Region "all" button
  regionContainer.querySelector('[data-region="all"]').addEventListener('click', () => setRegion('all'));

  // Robot filters
  document.querySelectorAll('#robot-filters .pill').forEach(btn => {
    btn.addEventListener('click', () => setRobot(btn.dataset.robot));
  });

  // Infantry sub filters
  document.querySelectorAll('#infantry-sub .pill').forEach(btn => {
    btn.addEventListener('click', () => setInfantrySub(btn.dataset.sub));
  });

  // Side filters
  document.querySelectorAll('#side-filters .pill').forEach(btn => {
    btn.addEventListener('click', () => setSide(btn.dataset.side));
  });

  // School filters
  updateSchoolFilters();
}

// ── Update School Filters based on Region ──
function updateSchoolFilters() {
  if (!heatmapData) return;

  const { config } = heatmapData;
  const container = document.getElementById('school-filters');

  // Get schools for current region
  let schools = [];
  if (currentRegion === 'all') {
    Object.values(config.regionSchools || {}).forEach(list => {
      schools.push(...list);
    });
    schools = [...new Set(schools)];
  } else {
    schools = (config.regionSchools || {})[currentRegion] || [];
  }
  schools.sort();

  // Clear existing buttons (keep "all")
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'pill' + (currentSchool === 'all' ? ' active' : '');
  allBtn.dataset.school = 'all';
  allBtn.textContent = '全部学校';
  allBtn.addEventListener('click', () => setSchool('all'));
  container.appendChild(allBtn);

  // Add school buttons
  schools.forEach(school => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (currentSchool === school ? ' active' : '');
    btn.dataset.school = school;
    btn.textContent = school.length > 10 ? school.substring(0, 10) + '...' : school;
    btn.title = school;
    btn.addEventListener('click', () => setSchool(school));
    container.appendChild(btn);
  });
}

// ── Set Region Filter ──
function setHeatmapType(type) {
  currentHeatmapType = type;

  document.querySelectorAll('#type-filters .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });

  renderHeatmap();
}

// ── Set Region Filter ──
function setRegion(region) {
  currentRegion = region;
  currentSchool = 'all'; // Reset school when region changes

  document.querySelectorAll('#region-filters .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.region === region);
  });

  updateSchoolFilters();
  renderHeatmap();
}

// ── Set Robot Filter ──
function setRobot(robot) {
  currentRobot = robot;
  document.querySelectorAll('#robot-filters .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.robot === robot);
  });
  // Show/hide infantry sub-menu
  document.getElementById('infantry-sub').style.display = robot === '步兵' ? '' : 'none';
  renderHeatmap();
}

function setInfantrySub(sub) {
  currentInfantrySub = sub;
  document.querySelectorAll('#infantry-sub .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sub === sub);
  });
  renderHeatmap();
}

// ── Set Side Filter ──
function setSide(side) {
  currentSide = side;
  document.querySelectorAll('#side-filters .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.side === side);
  });
  renderHeatmap();
}

// ── Set School Filter ──
function setSchool(school) {
  currentSchool = school;
  document.querySelectorAll('#school-filters .pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.school === school);
  });
  renderHeatmap();
}

// ── Render Heatmap ──
async function renderHeatmap() {
  if (!canvas || !heatmapData) return;

  const { config } = heatmapData;
  const { gridSize, robotTypes, xRange, yRange } = config;

  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Create aggregated grid
  const grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(0));
  let hasData = false;

  // Determine which regions to include
  const regions = currentRegion === 'all' ? config.regions : [currentRegion];

  // Determine which robot types to include (map display names to data keys)
  const robotKeys = getRobotDataKeys(currentRobot);
  let robots = robotKeys || robotTypes;
  // Attack/damage heatmaps only have 英雄/工程/步兵/空中/哨兵
  if (currentHeatmapType !== 'position' && !robotKeys) {
    robots = ['英雄', '工程', '步兵', '空中', '哨兵'];
  }

  // Central symmetry flip (rotate 180° around field center 14, 7.5)
  function flipGrid(gridData) {
    const flipped = Array.from({ length: gridSize }, () => Array(gridSize).fill(0));
    for (let y = 0; y < gridSize; y++) {
      for (let x = 0; x < gridSize; x++) {
        flipped[gridSize - 1 - y][gridSize - 1 - x] = gridData[y][x];
      }
    }
    return flipped;
  }

  // Helper: aggregate a {red, blue} grid pair into the main grid
  function aggregateSideGrid(robotData) {
    if (!robotData || !robotData.red || !robotData.blue) return;
    if (currentSide === 'red') {
      const flippedBlue = flipGrid(robotData.blue);
      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          grid[y][x] += robotData.red[y][x] + flippedBlue[y][x];
        }
      }
    } else {
      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          grid[y][x] += robotData.red[y][x] + robotData.blue[y][x];
        }
      }
    }
    hasData = true;
  }

  // Load and aggregate data
  const useAggregated = currentSchool === 'all';
  const regionList = useAggregated ? regions : regions; // same, but school list differs

  for (const region of regionList) {
    if (useAggregated) {
      // 使用预聚合文件，单次加载
      if (currentHeatmapType === 'position') {
        const schoolData = await loadSchoolData(region, '_all');
        if (schoolData) {
          for (const robot of robots) {
            const robotData = schoolData[robot];
            if (!robotData) continue;
            if (robotData.red && robotData.blue) {
              aggregateSideGrid(robotData);
            } else {
              for (let y = 0; y < gridSize; y++)
                for (let x = 0; x < gridSize; x++)
                  grid[y][x] += robotData[y][x];
              hasData = true;
            }
          }
        }
      } else {
        // Attack/damage: 并发加载各兵种的聚合文件
        const robotDataArr = await Promise.all(
          robots.map(async robot => ({ robot, data: await loadSchoolData(region, '_all', robot) }))
        );
        for (const { data } of robotDataArr) {
          if (data) aggregateSideGrid(data);
        }
      }
    } else {
      // 单个学校
      const schoolList = [currentSchool];
      for (const school of schoolList) {
        if (currentHeatmapType === 'position') {
          const schoolData = await loadSchoolData(region, school);
          if (!schoolData) continue;
          for (const robot of robots) {
            const robotData = schoolData[robot];
            if (!robotData) continue;
            if (robotData.red && robotData.blue) {
              aggregateSideGrid(robotData);
            } else {
              for (let y = 0; y < gridSize; y++)
                for (let x = 0; x < gridSize; x++)
                  grid[y][x] += robotData[y][x];
              hasData = true;
            }
          }
        } else {
          for (const robot of robots) {
            const schoolData = await loadSchoolData(region, school, robot);
            if (!schoolData) continue;
            aggregateSideGrid(schoolData);
          }
        }
      }
    }
  }

  if (!hasData) return;

  // Normalize
  const maxVal = Math.max(...grid.flat());
  if (maxVal === 0) return;

  // Draw heatmap
  const [gameXMin, gameXMax] = xRange;
  const [gameYMin, gameYMax] = yRange;
  const xStep = (gameXMax - gameXMin) / gridSize;
  const yStep = (gameYMax - gameYMin) / gridSize;

  // Calculate pixel size of one grid cell
  const topLeft = gameToPixel(gameXMin, gameYMax);
  const bottomRight = gameToPixel(gameXMax, gameYMin);
  const cellPixelWidth = (bottomRight.x - topLeft.x) / gridSize;
  const cellPixelHeight = (bottomRight.y - topLeft.y) / gridSize;

  for (let gy = 0; gy < gridSize; gy++) {
    for (let gx = 0; gx < gridSize; gx++) {
      const value = grid[gy][gx] / maxVal;
      if (value < 0.01) continue;

      // Convert grid index to game coordinates
      const gameX = gameXMin + (gx + 0.5) * xStep;
      const gameY = gameYMin + (gy + 0.5) * yStep;

      // Convert to pixel coordinates
      const pixel = gameToPixel(gameX, gameY);

      // Color mapping: blue -> green -> yellow -> red
      let r, g, b;
      if (value < 0.25) {
        r = 0;
        g = Math.round(value * 4 * 255);
        b = 255;
      } else if (value < 0.5) {
        r = 0;
        g = 255;
        b = Math.round((0.5 - value) * 4 * 255);
      } else if (value < 0.75) {
        r = Math.round((value - 0.5) * 4 * 255);
        g = 255;
        b = 0;
      } else {
        r = 255;
        g = Math.round((1 - value) * 4 * 255);
        b = 0;
      }

      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.3 + value * 0.5})`;
      ctx.fillRect(
        pixel.x - cellPixelWidth / 2,
        pixel.y - cellPixelHeight / 2,
        cellPixelWidth + 1,
        cellPixelHeight + 1
      );
    }
  }
}

// ── Initialize ──
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
