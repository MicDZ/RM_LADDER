<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Ladder — RoboMaster 天梯榜</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Design Tokens (from DESIGN.md) ── */
:root {
  --canvas-night: #000000;
  --canvas-night-soft: #0a0a0a;
  --canvas-light: #ffffff;
  --canvas-cool: #f0f0fa;
  --hairline-on-dark: #3a3a3f;
  --hairline-on-light: #e0e0e8;
  --on-primary: #ffffff;
  --on-primary-mute: #f0f0fa;
  --ink: #000000;
  --ink-mute: #5a5a5f;
  --accent: #e8e8e8;

  --font-display: 'D-DIN-Bold', 'Arial Narrow', Arial, Verdana, sans-serif;
  --font-body: 'D-DIN', Arial, Verdana, sans-serif;

  --sp-xxs: 4px;
  --sp-xs: 8px;
  --sp-sm: 12px;
  --sp-md: 16px;
  --sp-lg: 18px;
  --sp-xl: 24px;
  --sp-xxl: 32px;
  --sp-huge: 48px;

  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-pill: 32px;
}

/* ── Base ── */
html { scroll-behavior: smooth; }
body {
  background: var(--canvas-night);
  color: var(--on-primary);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  letter-spacing: 0.32px;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-xl) var(--sp-xxl);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--hairline-on-dark);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.nav-links { display: flex; gap: var(--sp-xl); }
.nav-links a {
  color: var(--on-primary);
  text-decoration: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.17px;
  text-transform: uppercase;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.nav-links a:hover, .nav-links a.active { opacity: 1; }
.nav-toggle { display: none; }

/* ── Hero ── */
.hero {
  padding: 160px var(--sp-xxl) var(--sp-huge);
  text-align: center;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 80px);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: 1.6px;
}
.hero p {
  margin-top: var(--sp-xl);
  color: var(--ink-mute);
  font-size: 16px;
  letter-spacing: 0.32px;
}

/* ── Container ── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--sp-xxl);
}

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-sm);
  padding: var(--sp-xl) 0;
  align-items: center;
}
.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-xxs);
}
.filter-label {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.96px;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-right: var(--sp-xs);
  display: flex;
  align-items: center;
}

/* ── Ghost Pill Buttons (from DESIGN.md) ── */
.pill {
  display: inline-block;
  padding: 8px 18px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.17px;
  text-transform: uppercase;
  color: var(--on-primary);
  background: var(--canvas-night);
  border: 1px solid var(--on-primary);
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  text-decoration: none;
}
.pill:hover { background: rgba(255,255,255,0.08); }
.pill.active {
  background: var(--on-primary);
  color: var(--ink);
}
.sub-pills {
  max-height: 0;
  overflow: hidden;
  gap: var(--sp-xxs);
  margin-left: 58px;
  margin-top: 0;
  transition: max-height 0.3s ease, margin-top 0.3s ease;
}
.sub-pills.show {
  max-height: 60px;
  margin-top: var(--sp-xs);
}
.zone-filter { flex-basis: 100%; }

/* ── Section Headers ── */
.section-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: 0.96px;
  text-transform: uppercase;
  margin: var(--sp-huge) 0 var(--sp-xl);
}
.section-subtitle {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 1.32px;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 0 0 var(--sp-md);
  padding-bottom: var(--sp-sm);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ── Search ── */
.search-wrap {
  position: relative;
  margin-bottom: var(--sp-md);
}
.search-input {
  width: 100%;
  max-width: 400px;
  padding: 12px 16px;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--on-primary);
  background: var(--canvas-night-soft);
  border: 1px solid var(--hairline-on-dark);
  border-radius: var(--radius-xs);
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--ink-mute); }
.search-input:focus { border-color: var(--on-primary); }

/* ── Table ── */
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 70vh;
  margin-bottom: var(--sp-huge);
  border: 1px solid var(--hairline-on-dark);
  border-radius: var(--radius-sm);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  padding: 6px var(--sp-md);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.96px;
  text-transform: uppercase;
  color: var(--ink-mute);
  background: var(--canvas-night-soft);
  border-bottom: 1px solid var(--hairline-on-dark);
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
  position: sticky;
  top: 0;
  z-index: 2;
}
thead th:hover { color: var(--on-primary); }
thead th.sorted { color: var(--on-primary); }
thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
thead th.sorted .sort-arrow { opacity: 1; }
tbody tr {
  border-bottom: 1px solid rgba(58,58,63,0.4);
  transition: background 0.15s;
}
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr.rank-1 { background: rgba(255,255,255,0.04); }
tbody tr.rank-1 td.rank-cell { color: var(--on-primary); font-size: 22px; }
tbody tr.rank-2 td.rank-cell { color: var(--on-primary-mute); }
tbody tr.rank-3 td.rank-cell { color: var(--hairline-on-dark); }
tbody td {
  padding: 6px var(--sp-md);
  white-space: nowrap;
}
td.rank-cell {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  width: 48px;
  text-align: center;
  color: var(--ink-mute);
  position: sticky;
  left: 0;
  z-index: 1;
  background: var(--canvas-night);
}
thead th:first-child {
  position: sticky;
  top: 0;
  left: 0;
  z-index: 3;
}
td.rank-cell.top3 { color: var(--on-primary); }
.team-cell {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  overflow: hidden;
}
.team-cell img {
  width: 36px !important;
  height: 36px !important;
  max-width: 36px;
  max-height: 36px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  flex-shrink: 0;
  background: #fff;
  padding: 2px;
}
.team-text { display: flex; flex-direction: column; }
.team-name { font-weight: 700; }
.team-college { color: var(--ink-mute); font-size: 12px; }
td.num-cell {
  font-variant-numeric: tabular-nums;
  text-align: right;
}
td.num-cell.highlight {
  color: var(--on-primary);
  font-weight: 700;
}

/* ── Ladder Board ── */
.ladder {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--sp-md);
  margin-bottom: var(--sp-huge);
}
.ladder-card {
  background: var(--canvas-night-soft);
  border: 1px solid var(--hairline-on-dark);
  border-radius: var(--radius-sm);
  padding: var(--sp-lg);
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  transition: border-color 0.2s;
}
.ladder-card:hover { border-color: var(--on-primary); }
.ladder-card.rank-1 { border-color: var(--on-primary); border-width: 2px; background: rgba(255,255,255,0.04); }
.ladder-card.rank-2 { border-color: var(--on-primary-mute); }
.ladder-card.rank-3 { border-color: var(--hairline-on-dark); }
.ladder-card.rank-1 .ladder-rank { color: var(--on-primary); font-size: 40px; }
.ladder-card.rank-2 .ladder-rank { color: var(--on-primary-mute); }
.ladder-card.rank-3 .ladder-rank { color: var(--hairline-on-dark); }
.ladder-logo {
  width: 40px !important;
  height: 40px !important;
  max-width: 40px;
  max-height: 40px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  flex-shrink: 0;
}
.ladder-rank {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.96px;
  color: var(--ink-mute);
  min-width: 48px;
  text-align: center;
}
.ladder-rank.top3 { color: var(--on-primary); }
.ladder-info { flex: 1; min-width: 0; }
.ladder-team { font-weight: 700; font-size: 16px; }
.ladder-detail {
  color: var(--ink-mute);
  font-size: 13px;
  margin-top: 2px;
}
.ladder-score {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.96px;
  white-space: nowrap;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--hairline-on-dark);
  margin-bottom: var(--sp-xl);
}
.tab-btn {
  padding: var(--sp-sm) var(--sp-xl);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.17px;
  text-transform: uppercase;
  color: var(--ink-mute);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--on-primary); }
.tab-btn.active {
  color: var(--on-primary);
  border-bottom-color: var(--on-primary);
}

/* ── Footer ── */
.footer {
  padding: var(--sp-xxl) var(--sp-xxl);
  border-top: 1px solid var(--hairline-on-dark);
  text-align: center;
  color: var(--ink-mute);
  font-size: 13px;
  letter-spacing: 0;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .hero h1 { font-size: 44px; }
  .hero { padding: 120px var(--sp-xl) var(--sp-xxl); }
  .section-title { font-size: 32px; }
  .container { padding: 0 var(--sp-md); }
  .nav { padding: var(--sp-md); }
  .nav-links { gap: var(--sp-md); }
  .ladder { grid-template-columns: 1fr; }
  .stat-value { font-size: 26px; }
  .school-header {
    flex-wrap: wrap;
    gap: var(--sp-md);
    align-items: flex-start;
  }
  .school-header .school-search {
    flex-basis: 100%;
    min-width: 0 !important;
  }
  .school-header .school-search input {
    width: 100%;
    min-width: 0 !important;
  }
}

/* ── Responsive: Small Mobile < 600px ── */
@media (max-width: 600px) {
  /* Hero */
  .hero {
    padding: 100px var(--sp-md) var(--sp-xl);
  }
  .hero h1 {
    font-size: 36px;
    letter-spacing: 1px;
  }
  .hero p {
    font-size: 14px;
  }

  /* Section titles */
  .section-title {
    font-size: 28px;
    margin: var(--sp-xl) 0 var(--sp-md);
  }
  .section-subtitle {
    font-size: 10px;
    letter-spacing: 1px;
  }

  /* Stats summary */
  .stat-value { font-size: 24px; }
  .stats-summary { gap: var(--sp-md); }

  /* Container */
  .container { padding: 0 var(--sp-sm); }

  /* Filter bar */
  .filter-bar {
    gap: var(--sp-xxs);
    padding: var(--sp-md) 0;
  }
  .pill {
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 0.8px;
  }

  /* Search */
  .search-input {
    max-width: none;
    width: 100%;
  }

  /* Table wrap — hide desktop table on mobile */
  .table-wrap {
    max-height: none;
    border: none;
    border-radius: 0;
    overflow-x: visible;
  }

  /* School detail pages */
  #schoolDetail { padding-top: 80px !important; }
  #compareSection { padding-top: 80px !important; }
  .school-header { gap: var(--sp-sm); }
  .school-logo { width: 48px; height: 48px; }

  /* Compare slots */
  .compare-slot {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--sp-xxs);
    padding: var(--sp-sm) 0;
    border-bottom: 1px solid var(--hairline-on-dark);
    margin-bottom: var(--sp-xs);
  }
  .compare-select {
    width: 100% !important;
    min-width: 0 !important;
    padding: 6px 10px;
    font-size: 12px;
  }
  .compare-reorder,
  .compare-remove {
    align-self: flex-end;
    margin-top: -36px;
  }

  /* Match history */
  .match-stat { font-size: 18px; }
  .match-stat.total {
    margin-left: 0;
    flex-basis: 100%;
  }
  .match-season-header {
    font-size: 14px;
  }
  .match-item {
    font-size: 12px;
  }

  /* Type detail grid — hide desktop grid on mobile (JS renders alternative) */
  .type-detail-grid { display: none; }

  /* Footer */
  .footer {
    padding: var(--sp-xl) var(--sp-md);
    font-size: 11px;
  }

  /* Compare radar canvas */
  .compare-radar-wrap canvas {
    max-width: 100% !important;
    height: auto !important;
  }

  /* Sub-pills */
  .sub-pills { margin-left: 0; }

  /* ── Hamburger Nav ── */
  .nav { flex-wrap: wrap; }
  .nav-links {
    display: none;
    flex-direction: column;
    width: 100%;
    gap: 0;
    margin-top: var(--sp-md);
    padding-top: var(--sp-sm);
    border-top: 1px solid var(--hairline-on-dark);
  }
  .nav.nav-open .nav-links { display: flex; }
  .nav-links a {
    padding: var(--sp-sm) 0;
    font-size: 14px;
    letter-spacing: 1.5px;
    border-bottom: 1px solid rgba(58,58,63,0.3);
  }
  .nav-links a:last-child { border-bottom: none; }
  .nav-toggle {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }
  .nav-toggle span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--on-primary);
    transition: transform 0.2s, opacity 0.2s;
  }
  .nav.nav-open .nav-toggle span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  .nav.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
  .nav.nav-open .nav-toggle span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* ── Mobile Data Cards ── */
  .mobile-data-cards {
    display: flex;
    flex-direction: column;
    gap: var(--sp-xxs);
    margin-bottom: var(--sp-huge);
  }
  .mobile-data-card {
    background: var(--canvas-night-soft);
    border: 1px solid var(--hairline-on-dark);
    border-radius: var(--radius-sm);
    padding: var(--sp-sm) var(--sp-md);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .mobile-data-card:active,
  .mobile-data-card.expanded {
    border-color: var(--on-primary);
  }
  .mobile-data-card-header {
    display: flex;
    align-items: center;
    gap: var(--sp-sm);
  }
  .mobile-data-card-header img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    background: #fff;
    padding: 2px;
    flex-shrink: 0;
  }
  .mobile-data-card-rank {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .mobile-data-card-rank.top3 { color: var(--on-primary); }
  .mobile-data-card-name {
    flex: 1;
    min-width: 0;
  }
  .mobile-data-card-team {
    font-weight: 700;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mobile-data-card-college {
    color: var(--ink-mute);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mobile-data-card-arrow {
    color: var(--ink-mute);
    font-size: 12px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .mobile-data-card.expanded .mobile-data-card-arrow {
    transform: rotate(180deg);
  }
  .mobile-data-card-details {
    display: none;
    margin-top: var(--sp-sm);
    padding-top: var(--sp-sm);
    border-top: 1px solid var(--hairline-on-dark);
  }
  .mobile-data-card.expanded .mobile-data-card-details {
    display: block;
  }
  .mobile-data-card-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 13px;
  }
  .mobile-data-card-detail-label {
    color: var(--ink-mute);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .mobile-data-card-detail-value {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  .mobile-data-card-detail-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    padding: 5px 12px;
  }

  /* ── Mobile Type Detail ── */
  .type-detail-grid-mobile {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--hairline-on-dark);
    border: 1px solid var(--hairline-on-dark);
    border-radius: var(--radius-sm);
    margin-bottom: var(--sp-xl);
  }
  .type-detail-row-mobile {
    background: var(--canvas-night-soft);
    padding: var(--sp-sm) var(--sp-md);
    cursor: pointer;
    transition: background 0.15s;
  }
  .type-detail-row-mobile:active {
    background: rgba(255,255,255,0.04);
  }
  .type-detail-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .type-detail-row-label {
    color: var(--ink-mute);
    font-size: 13px;
  }
  .type-detail-row-primary {
    text-align: right;
    font-weight: 700;
    font-size: 14px;
  }
  .type-detail-row-primary .rank-sub {
    font-size: 11px;
    color: var(--ink-mute);
    display: block;
    font-weight: 400;
  }
  .type-detail-row-expand {
    display: none;
    margin-top: var(--sp-sm);
    padding-top: var(--sp-sm);
    border-top: 1px solid rgba(58,58,63,0.3);
  }
  .type-detail-row-mobile.expanded .type-detail-row-expand {
    display: block;
  }
  .type-detail-zone-col {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 13px;
  }
  .type-detail-zone-col .zone-name {
    color: var(--ink-mute);
    font-size: 11px;
  }

  /* Compare mobile rank badges */
  .compare-mobile-ranks {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .compare-rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 24px;
    padding: 0 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: var(--font-display);
    border: 2px solid var(--hairline-on-dark);
    border-radius: 12px;
    color: var(--on-primary);
    background: rgba(255,255,255,0.05);
  }
  .type-detail-row-mobile.expanded .compare-rank-badge {
    background: rgba(255,255,255,0.1);
  }
}

/* ── View Toggle ── */
.view-toggle {
  display: flex;
  gap: var(--sp-xxs);
  margin-bottom: var(--sp-md);
}

/* ── School Detail ── */
.school-header {
  display: flex;
  align-items: center;

async function loadData(year) {
  if (DATA_CACHE[year]) return DATA_CACHE[year];
  const cfg = YEAR_CONFIG[year];
  const resp = await fetch(cfg.file);
  let data = await resp.json();
  if (cfg.isGameStats) {
    // Transform flat game stats into zone-based structure with per-type robots
    const types = cfg.gameStatTypes || {};
    const teams = Object.values(data.schools).map(s => ({
      collegeName: s.collegeName,
      name: s.collegeName,
      collegeLogo: '',
      robots: Object.keys(types).map(type => ({ type, robotNumber: '-', ...s })),
    }));
    data = { zones: [{ zoneId: 'all', zoneName: '全国赛', teams }] };
  }
  DATA_CACHE[year] = data;
  return data;
}

// ── Hash Router ──
function handleRoute() {
  const hash = window.location.hash || '#ladder';
  // Update nav active state
  const navBase = hash.startsWith('#school') ? '#school' : (hash === '#compare' ? '#compare' : (hash === '#data' ? '#data' : '#ladder'));
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === navBase);
  });
  const heroEl = document.querySelector('.hero');
  const statsEl = document.getElementById('statsSummary');
  const ladderEl = document.getElementById('ladder');
  const dataEl = document.getElementById('data');
  const schoolEl = document.getElementById('schoolDetail');
  const compareEl = document.getElementById('compareSection');

  if (hash.startsWith('#school')) {
    heroEl.style.display = 'none';
    statsEl.style.display = 'none';
    ladderEl.style.display = 'none';
    dataEl.style.display = 'none';
    schoolEl.style.display = 'block';
    compareEl.style.display = 'none';
    disposeChart('compareRadar');
    disposeChart('compareHistory');

    if (hash.includes('?')) {
      const params = new URLSearchParams(hash.split('?')[1]);
      schoolCollege = decodeURIComponent(params.get('college') || '');
      schoolType = params.get('type') || '';
      const year = params.get('year') || currentYear;

      if (year !== currentYear) {
        currentYear = year;
        DATA = null;
        const cfg = YEAR_CONFIG[year];
        if (cfg.gameStatTypes) {
          const firstType = Object.keys(cfg.gameStatTypes)[0];
          currentType = firstType; ladderType = firstType;
        } else { currentType = 'Infantry'; ladderType = 'Infantry'; }
      }
      showLoading();
      loadData(year).then(data => {
        DATA = data;
        if (year !== currentYear) currentYear = year;
        renderSchoolDetail();
        hideLoading();
      });
    } else {
      // Pure #school — show page without a specific school
      schoolCollege = '';
      schoolType = '';
      showLoading();
      loadData(currentYear).then(data => {
        DATA = data;
        renderSchoolDetail();
        hideLoading();
      });
    }
  } else if (hash === '#compare') {
    heroEl.style.display = 'none';
    statsEl.style.display = 'none';
    ladderEl.style.display = 'none';
    dataEl.style.display = 'none';
    disposeChart('schoolRadar');
    disposeChart('schoolHistory');
    schoolEl.style.display = 'none';
    compareEl.style.display = 'block';

    if (!DATA) {
      showLoading();
      loadData(currentYear).then(data => {
        DATA = data;
        renderComparePage();
        hideLoading();
      });
    } else {
      renderComparePage();
    }
  } else {
    heroEl.style.display = '';
    statsEl.style.display = '';
    ladderEl.style.display = '';
    dataEl.style.display = '';
    schoolEl.style.display = 'none';
    compareEl.style.display = 'none';

    if (!DATA) {
      showLoading();
      loadData(currentYear).then(data => {
        DATA = data;
        renderMainView(hash);
        hideLoading();
      });
    } else {
      renderMainView(hash);
    }
  }
}

// ── School Detail Data Helpers ──
function zoneHasData(zone) {
  // Zone hasn't started if no robot has any non-zero stat
  for (const t of zone.teams) {
    for (const r of t.robots) {
      for (const key of Object.keys(r)) {
        if (typeof r[key] === 'number' && r[key] > 0 && key !== 'id' && key !== 'robotNumber') {
          return true;
        }
      }
    }
  }
  return false;
}

function getCollegeTeams(collegeName) {
  const cfg = YEAR_CONFIG[currentYear];
  const results = [];
  DATA.zones.forEach(z => {
    if (cfg.excludedZones.includes(z.zoneId)) return;
    z.teams.forEach(t => {
      if (t.collegeName === collegeName) {
        results.push({ zoneId: z.zoneId, zoneName: z.zoneName, team: t });
      }
    });
  });
  return results;
}

function getRobotRank(robotType, zoneId) {
  const cfg = YEAR_CONFIG[currentYear];
  const ladderCfg = cfg.ladderFields[robotType];
  if (!ladderCfg) return { total: 0, sorted: [], field: '', label: '' };
  let robots;
  if (zoneId === 'all') {
    robots = getRobots('all', robotType);
  } else {
    robots = getRobots(zoneId, robotType);
  }
  // Infantry: rank by k + a * 0.4
  if (robotType === 'Infantry') {
    robots.forEach(r => {
      const parts = (r.eaKDA || '0/0/0').split('/');
      const k = parseFloat(parts[0]) || 0;
      const a = parseFloat(parts[2]) || 0;
      r._ladderScore = k + a * 0.4;
    });
    robots.sort((a, b) => (b._ladderScore || 0) - (a._ladderScore || 0));
  } else if (ASC_FIELDS.has(ladderCfg.field)) {
    robots.sort((a, b) => (a[ladderCfg.field] || 0) - (b[ladderCfg.field] || 0));
  } else {
    robots.sort((a, b) => (b[ladderCfg.field] || 0) - (a[ladderCfg.field] || 0));
  }
  return { total: robots.length, sorted: robots, field: ladderCfg.field, label: ladderCfg.label };
}

function getCollegeRobotInZone(collegeName, zoneId, type) {
  const teams = getCollegeTeams(collegeName);
  const teamInZone = teams.find(t => t.zoneId === zoneId);
  if (!teamInZone) return null;
  return teamInZone.team.robots.find(r => r.type === type) || null;
}

function getAllColleges(year) {
  const colleges = new Set();
  for (const y of Object.keys(DATA_CACHE)) {

    const cfg = YEAR_CONFIG[y];
    yearData.zones.forEach(z => {
      if (cfg.excludedZones.includes(z.zoneId)) return;
      z.teams.forEach(t => colleges.add(t.collegeName));
    });
  }
  return [...colleges].sort();
}

// ── Radar Chart ──
function renderRadarChart() {
  const container = document.getElementById('schoolRadarWrap');
  const ladderFields = YEAR_CONFIG[currentYear].ladderFields;
  const types = Object.keys(ladderFields);

  // Compute rank data for each type
  const dataPoints = types.map(type => {
    const ranked = getRobotRank(type, schoolZone);
    let rank = ranked.total + 1; // default: worst (not found)
    let value = 0;
    for (let i = 0; i < ranked.sorted.length; i++) {
      const r = ranked.sorted[i];
      if (r.collegeName === schoolCollege) {
        rank = i + 1;
        value = (type === 'Infantry' ? r._ladderScore : r[ranked.field]) || 0;
        break;
      }
    }
    return {
      typeName: TYPE_NAMES[type],
      typeKey: type,
      rank,
      total: ranked.total,
      value,
      label: ranked.label,
    };
  });

  disposeChart('schoolRadar');
  container.innerHTML = '<div class="chart-container" id="schoolRadarChart"></div>';
  const chartDom = document.getElementById('schoolRadarChart');
  if (!chartDom) return;
  const chart = echarts.init(chartDom, null, { devicePixelRatio: 2 });
  chartInstances.schoolRadar = chart;

  const indicators = dataPoints.map(d => ({
    name: d.typeName + '\n#' + d.rank,
    max: 1
  }));

  const values = dataPoints.map(d => {
    const ratio = d.total > 1 ? (d.rank - 1) / (d.total - 1) : 0;
    return +(1 - ratio).toFixed(4);
  });

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: { show: false },
    radar: {
      center: ['50%', '50%'],
      radius: '62%',
      splitNumber: 4,
      shape: 'polygon',
      axisName: {
        color: '#ffffff',
        fontSize: 11,
        fontFamily: 'D-DIN, Arial, sans-serif',
        overflow: 'truncate',
        width: 60
      },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.08)', width: 1 } },
      splitArea: { areaStyle: { color: ['transparent', 'transparent'] } },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.08)', width: 1 } },
      indicator: indicators
    },
    series: [{
      type: 'radar',
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { color: 'rgba(255,255,255,0.6)', width: 2 },
      areaStyle: { color: 'rgba(255,255,255,0.05)' },
      itemStyle: { color: 'rgba(255,255,255,0.8)' },
      emphasis: {
        lineStyle: { color: '#ffffff', width: 3 },
        areaStyle: { color: 'rgba(255,255,255,0.12)' },
        itemStyle: { color: '#ffffff' }
      },
      data: [{ value: values, name: schoolCollege }]
    }]
  });

  // Click handler: detect nearest axis by angle
  chart.on('click', function(params) {
    if (params.componentType === 'radar') {
      const rect = chartDom.getBoundingClientRect();
      const evt = params.event.event || params.event;
      const clickX = (evt.clientX || evt.offsetX || 0) - rect.left;
      const clickY = (evt.clientY || evt.offsetY || 0) - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const angle = Math.atan2(clickY - centerY, clickX - centerX);
      const numAxes = dataPoints.length;
      const angleStep = (2 * Math.PI) / numAxes;
      const startAngle = -Math.PI / 2;
      let closestIdx = 0;
      let closestDist = Infinity;
      for (let i = 0; i < numAxes; i++) {
        const axAngle = startAngle + i * angleStep;
        let diff = Math.abs(angle - axAngle);
        if (diff > Math.PI) diff = 2 * Math.PI - diff;
        if (diff < closestDist) { closestDist = diff; closestIdx = i; }
      }
      if (closestDist < angleStep / 2) {
        schoolType = types[closestIdx];
        showTypeDetail(schoolType, true);
        navigateToSchool(schoolCollege, schoolType, currentYear);
      }
    }
  });

  // ── Custom tooltip: follow mouse, show nearest axis data ──
  const tipDiv = document.createElement('div');
  tipDiv.className = 'radar-custom-tip';
  chartDom.appendChild(tipDiv);

  function getRadarAxis(params, rect) {
    const evt = params.event.event || params.event;
    const mx = (evt.clientX || evt.offsetX || 0) - rect.left;
    const my = (evt.clientY || evt.offsetY || 0) - rect.top;
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const angle = Math.atan2(my - cy, mx - cx);
    const n = dataPoints.length;
    const angleStep = (2 * Math.PI) / n;
    const startAngle = -Math.PI / 2;
    let closestIdx = 0;
    let closestDist = Infinity;
    for (let i = 0; i < n; i++) {
      let diff = Math.abs(angle - (startAngle + i * angleStep));
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      if (diff < closestDist) { closestDist = diff; closestIdx = i; }
    }
    if (closestDist < angleStep * 0.6) return closestIdx;
    return -1;
  }

  chart.on('mousemove', function(params) {
    if (params.componentType !== 'radar') { tipDiv.style.display = 'none'; return; }
    const rect = chartDom.getBoundingClientRect();
    const axisIdx = getRadarAxis(params, rect);
    if (axisIdx < 0) { tipDiv.style.display = 'none'; return; }
    const dp = dataPoints[axisIdx];
    const mx = (params.event.event || params.event).clientX - rect.left;
    const my = (params.event.event || params.event).clientY - rect.top;
    tipDiv.innerHTML =
      '<div class="tip-header">' + esc(dp.typeName) + '</div>' +
      '<div class="tip-row"><span class="tip-name">排名</span> <span class="tip-rank">#' + dp.rank + ' / ' + dp.total + '</span></div>' +
      '<div class="tip-row"><span class="tip-name">' + esc(dp.label) + '</span> <span>' + (typeof dp.value === 'number' ? dp.value.toFixed(1) : dp.value) + '</span></div>';
    tipDiv.style.display = 'block';
    // Position: follow mouse, keep within container
    let left = mx + 14;
    let top = my - 10;
    if (left + 200 > rect.width) left = mx - 200;
    if (top + 60 > rect.height) top = my - 70;
    if (left < 0) left = 4;
    if (top < 0) top = 4;
    tipDiv.style.left = left + 'px';
    tipDiv.style.top = top + 'px';
  });
  chart.on('mouseout', function() { tipDiv.style.display = 'none'; });

  document.getElementById('radarHint').style.display = 'block';
}

function setHistoryTab(tab, el) {
  currentHistoryTab = tab;
  el.closest('.filter-group').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderHistoryChart();

function renderHistoryChart() {
  const wrap = document.getElementById('historyChartWrap');

  // Determine which tabs have data for this school
  const available = HISTORY_TABS.filter(t => {
    if (t.type === 'html') {
      // Match history tab: check matchHistory data
      return matchHistory && getHistoryData(matchHistory, schoolCollege);
    }
    const d = t.data();
    return d && getHistoryData(d, schoolCollege) && getHistoryData(d, schoolCollege).length >= 2;
  });

  if (available.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  // Ensure current tab is valid
  if (!available.find(t => t.key === currentHistoryTab)) {
    currentHistoryTab = available[0].key;
  }

  // Branch: match history tab uses HTML rendering, not canvas
  if (currentHistoryTab === 'match') {
    renderMatchHistory(wrap, available);
    return;
  }

  const activeTab = available.find(t => t.key === currentHistoryTab);
  const dataObj = activeTab.data();
  const entries = getHistoryData(dataObj, schoolCollege);

  wrap.style.display = 'block';

  const years = entries.map(e => e.year);
  const ranks = entries.map(e => e.rank);
  const minRank = Math.min(...ranks);
  const maxRank = Math.max(...ranks);
  const rankRange = maxRank - minRank || 1;

  // Build label for each point
  const getLabel = (e) => {
    if (activeTab.key === 'score') return '# ' + e.rank + ' ' + e.score.toFixed(1);
    if (activeTab.key === 'goldcoin') {
      const gc = e.goldcoin;
      return '# ' + e.rank + ' ' + (gc > 0 ? '+' + gc : gc);
    }
    return '# ' + e.rank;
  };

  const minR = minRank - rankRange * 0.1;
  const maxR = Math.max(1, maxRank + rankRange * 0.1);
  const rRange = maxR - minR;

  disposeChart('schoolHistory');
  wrap.innerHTML = `
    <div class="type-detail-section">
      <div class="section-subtitle">历史数据</div>
      <div class="filter-group" style="margin-bottom:var(--sp-md)">
        ${available.map(t => `<button class="pill${t.key === currentHistoryTab ? ' active' : ''}" onclick="setHistoryTab('${t.key}',this)">${t.label}</button>`).join('')}

      <div id="schoolHistoryChart" class="history-chart-container"></div>
    </div>
  `;

  const chartDom = document.getElementById('schoolHistoryChart');
  if (!chartDom) return;
  const chart = echarts.init(chartDom, null, { devicePixelRatio: 2 });
  chartInstances.schoolHistory = chart;

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(10,10,10,0.95)',
      borderColor: '#3a3a3f',
      textStyle: { color: '#ffffff', fontFamily: 'D-DIN, Arial, sans-serif', fontSize: 12 },
      formatter: function(params) {
        if (!params || params.length === 0) return '';
        const e = entries[params[0].dataIndex];
        return e.year + '<br/>' + getLabel(e);
      }
    },
    grid: { left: 50, right: 20, top: 30, bottom: 40 },
    xAxis: {
      type: 'category',
      data: years,
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
      axisTick: { show: false },
      axisLabel: {
        color: 'rgba(255,255,255,0.5)',
        fontSize: 11,
        fontFamily: 'D-DIN, Arial, sans-serif'
      }
    },
    yAxis: {
      type: 'value',
      inverse: true,
      min: minR,
      max: maxR,
      interval: Math.max(1, Math.ceil(rRange / 4)),
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } },
      axisLabel: {
        color: 'rgba(255,255,255,0.35)',
        fontSize: 11,
        fontFamily: 'D-DIN, Arial, sans-serif',
        formatter: function(v) { return '#' + Math.round(v); }
      }
    },
    series: [{
      type: 'line',
      data: entries.map(e => e.rank),
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { color: 'rgba(255,255,255,0.7)', width: 2 },
      itemStyle: { color: '#ffffff' },
      areaStyle: { color: 'rgba(255,255,255,0.03)' },
      label: {
        show: true,
        position: 'top',
        color: 'rgba(255,255,255,0.8)',
        fontSize: 11,
        fontFamily: 'D-DIN-Bold, D-DIN, Arial, sans-serif',
        fontWeight: 'bold',
        formatter: function(params) {
          const e = entries[params.dataIndex];
          return getLabel(e);
        }
      },
      emphasis: {
        focus: 'series',
        label: { fontSize: 13 }
      }
    }]
  });
}

function renderMatchHistory(wrap, available) {
  const data = getHistoryData(matchHistory, schoolCollege);
  if (!data || data.length === 0) {
    wrap.innerHTML = '<div class="type-detail-section"><p style="color:var(--ink-mute);padding:var(--sp-md)">无比赛数据</p></div>';
    return;
  }

  const summary = matchHistory.summary[normCollegeName(schoolCollege)] || matchHistory.summary[schoolCollege];
  const allSeasons = data;

  let html = '<div class="type-detail-section">';
  html += '<div class="section-subtitle">历史数据</div>';

  html += '<div class="filter-group" style="margin-bottom:var(--sp-md)">';

  html += '</div>';

  // Overall W-L-D summary
  if (summary) {
    const totalGames = summary.totalWins + summary.totalLosses + summary.totalDraws;
    const winRate = totalGames > 0 ? (summary.totalWins / totalGames * 100).toFixed(1) : '0.0';
    html += '<div class="match-summary-bar">';

    html += `<span class="match-stat total">共 ${totalGames} 场</span>`;
    html += '</div>';
  }

  // Per-season breakdown (most recent first)
  const reversedSeasons = [...allSeasons].reverse();
  reversedSeasons.forEach(seasonData => {
    const season = seasonData.season;
    const ss = summary && summary.perSeason ? summary.perSeason[season] : null;
    html += '<div class="match-season-group">';
    html += `<div class="match-season-header" onclick="toggleMatchSeason(this)" style="cursor:pointer">`;
    html += '<span class="match-season-arrow">▾</span>';
    html += `<span class="match-season-year">${season}</span>`;

      html += `<span class="match-season-record">${ss.wins}胜 ${ss.losses}负 ${ss.draws}平 · ${ss.wins + ss.losses + ss.draws}场</span>`;
    }

    html += '<div class="match-list">';
    seasonData.matches.forEach(m => {
      const resultClass = m.result === 'win' ? 'match-win' : m.result === 'loss' ? 'match-loss' : 'match-draw';
      const resultLabel = m.result === 'win' ? '胜' : m.result === 'loss' ? '负' : '平';
      html += `<div class="match-item ${resultClass}">`;
      html += `<span class="match-result-badge ${resultClass}">${resultLabel}</span>`;
      html += '<div class="match-info">';
      html += `<span class="match-opponent">vs ${esc(m.opponent)}</span>`;
      html += `<span class="match-meta">${esc(m.score)} · ${esc(m.zone)} · ${esc(m.group)}</span>`;
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';
  wrap.innerHTML = html;
}

function initCompareRadarChart(containerId, slotData) {
  // slotData: [{ label, color, typeRanks: [{ typeKey, typeName, rank, total, value? }] }, ...]
  disposeChart('compareRadar');
  const chartDom = document.getElementById(containerId);
  if (!chartDom) return;

  const chart = echarts.init(chartDom, null, { devicePixelRatio: 2 });
  chartInstances.compareRadar = chart;

  const indicators = slotData[0].typeRanks.map(d => ({
    name: d.typeName,
    max: 1
  }));

  // Store raw rank+value data for axis-triggered tooltip
  const rawData = slotData.map(slot =>
    slot.typeRanks.map(d => ({
      rank: d.rank,
      total: d.total,
      value: d.value ?? null
    }))
  );

  const series = slotData.map(slot => {
    const values = slot.typeRanks.map(d => {
      if (typeof d.rank !== 'number' || typeof d.total !== 'number' || d.total <= 1) {
        return null;
      }
      const ratio = (d.rank - 1) / (d.total - 1);
      return +(1 - ratio).toFixed(4);
    });
    return {
      name: slot.label,
      type: 'radar',
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { color: slot.color, width: 2 },
      areaStyle: { color: slot.color.replace('1)', '0.08)').replace('0.9)', '0.08)') },
      itemStyle: { color: slot.color },
      emphasis: {
        lineStyle: { width: 3 },
        areaStyle: { color: slot.color.replace('1)', '0.15)').replace('0.9)', '0.15)') }
      },
      data: [{ value: values, name: slot.label }]
    };
  });

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: { show: false },
    legend: {
      bottom: 0,
      data: slotData.map(s => s.label),
      textStyle: { color: 'rgba(255,255,255,0.7)', fontSize: 10, fontFamily: 'D-DIN, Arial, sans-serif' },
      icon: 'circle',
      itemWidth: 8,
      itemHeight: 8
    },
    radar: {
      center: ['50%', '45%'],
      radius: '55%',
      splitNumber: 4,
      shape: 'polygon',
      axisName: {
        color: '#ffffff',
        fontSize: 10,
        fontFamily: 'D-DIN, Arial, sans-serif',
        overflow: 'truncate',
        width: 70
      },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.08)', width: 1 } },
      splitArea: { areaStyle: { color: ['transparent', 'transparent'] } },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.08)', width: 1 } },
      indicator: indicators
    },
    series: series
  });

  // ── Custom tooltip: shows all schools' data for the hovered axis ──
  const tipDiv = document.createElement('div');
  tipDiv.className = 'radar-custom-tip';
  chartDom.appendChild(tipDiv);

  chart.on('mousemove', function(params) {
    if (params.componentType !== 'radar') { tipDiv.style.display = 'none'; return; }
    const rect = chartDom.getBoundingClientRect();
    const evt = params.event.event || params.event;
    const mx = (evt.clientX || evt.offsetX || 0) - rect.left;
    const my = (evt.clientY || evt.offsetY || 0) - rect.top;
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const angle = Math.atan2(my - cy, mx - cx);
    const n = indicators.length;
    const angleStep = (2 * Math.PI) / n;
    const startAngle = -Math.PI / 2;
    let axisIdx = -1;
    let closestDist = Infinity;
    for (let i = 0; i < n; i++) {
      let diff = Math.abs(angle - (startAngle + i * angleStep));
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      if (diff < closestDist) { closestDist = diff; axisIdx = i; }
    }
    if (closestDist > angleStep * 0.6) { tipDiv.style.display = 'none'; return; }

    const dimName = indicators[axisIdx].name;
    let html = '<div class="tip-header">' + esc(dimName) + '</div>';
    for (let si = 0; si < slotData.length; si++) {
      const slot = slotData[si];
      const raw = rawData[si] && rawData[si][axisIdx];
      html += '<div class="tip-row">';
      html += '<span class="tip-dot" style="background:' + slot.color + '"></span>';
      html += '<span class="tip-name">' + esc(slot.label.split(' · ')[0]) + '</span>';
      if (raw && raw.rank !== '-' && raw.rank !== undefined && raw.rank !== null && raw.rank !== '?') {
        html += ' <span class="tip-rank">#' + raw.rank + '/' + raw.total + '</span>';
      } else {
        html += ' <span class="tip-no-data">无数据</span>';
      }
      if (raw && raw.value !== null && raw.value !== undefined) {
        html += ' <span class="tip-val">(' + formatNum(raw.value) + ')</span>';
      }
      html += '</div>';
    }
    tipDiv.innerHTML = html;
    tipDiv.style.display = 'block';
    let left = mx + 14;
    let top = my - 10;
    if (left + 220 > rect.width) left = mx - 220;
    if (top + (60 + slotData.length * 20) > rect.height) top = my - (60 + slotData.length * 20);
    if (left < 0) left = 4;
    if (top < 0) top = 4;
    tipDiv.style.left = left + 'px';
    tipDiv.style.top = top + 'px';
  });
  chart.on('mouseout', function() { tipDiv.style.display = 'none'; });
}
// Field name aliases for cross-year compatibility
const FIELD_YEAR_ALIASES = { eaAssembleEcon: 'eaExchangeEcon' };
const FIELD_YEAR_ALIASES_REV = {};
for (const [k, v] of Object.entries(FIELD_YEAR_ALIASES)) FIELD_YEAR_ALIASES_REV[v] = k;

function getRobotFieldValue(robot, field, year) {
  if (!robot) return null;
  // Check if this field is valid for the given year
  if (year) {
    const cfg = YEAR_CONFIG[year];
    const type = robot.type;
    const validFields = cfg?.typeFields?.[type] || [];
    if (validFields.includes(field)) return robot[field] ?? null;
    // Field not valid for this year — check alias
    const alias = FIELD_YEAR_ALIASES[field];
    if (alias && validFields.includes(alias)) return robot[alias] ?? null;
    const revAlias = FIELD_YEAR_ALIASES_REV[field];
    if (revAlias && validFields.includes(revAlias)) return robot[revAlias] ?? null;
  }
  // Fallback: direct property check
  if (Object.prototype.hasOwnProperty.call(robot, field)) return robot[field];
  const alias = FIELD_YEAR_ALIASES[field];
  if (alias && Object.prototype.hasOwnProperty.call(robot, alias)) return robot[alias];
  return null;
}

function getFieldRank(type, field, zoneId, year, college) {
  const targetCollege = college || schoolCollege;
  const yearData = year === currentYear ? DATA : DATA_CACHE[year];
  if (!yearData) return { rank: '-', total: '?' };
  const cfg = YEAR_CONFIG[year];
  const robots = [];
  yearData.zones.forEach(z => {
    if (cfg.excludedZones.includes(z.zoneId)) return;
    if (zoneId !== 'all' && z.zoneId !== zoneId) return;
    z.teams.forEach(t => {
      t.robots.forEach(r => {
        if (r.type === type) robots.push({ ...r, collegeName: t.collegeName });
      });
    });
  });
  // Infantry: rank by k + a * 0.4
  if (type === 'Infantry' && (field === 'eagKdaScore' || field === 'eaKDA')) {
    robots.forEach(r => {
      const parts = (r.eaKDA || '0/0/0').split('/');
      const k = parseFloat(parts[0]) || 0;
      const a = parseFloat(parts[2]) || 0;
      r._rankScore = k + a * 0.4;
    });
    robots.sort((a, b) => (b._rankScore || 0) - (a._rankScore || 0));
  } else if (ASC_FIELDS.has(field)) {
    robots.sort((a, b) => (getRobotFieldValue(a, field, year) || 0) - (getRobotFieldValue(b, field, year) || 0));
  } else {
    robots.sort((a, b) => (getRobotFieldValue(b, field, year) || 0) - (getRobotFieldValue(a, field, year) || 0));
  }
  for (let i = 0; i < robots.length; i++) {
    if (robots[i].collegeName === targetCollege) return { rank: i + 1, total: robots.length };
  }
  return { rank: '-', total: robots.length };
}

function renderTypeDetail() {
  if (!schoolType || !TYPE_NAMES[schoolType]) return;
  const el = document.getElementById('schoolTypeDetail');
  const typeName = TYPE_NAMES[schoolType];
  const cfg = YEAR_CONFIG[currentYear];

  // Get all zones where this college has this robot type
  const available = [];
  DATA.zones.forEach(z => {
    if (cfg.excludedZones.includes(z.zoneId)) return;
    z.teams.forEach(t => {
      if (t.collegeName === schoolCollege && t.robots.some(r => r.type === schoolType)) {
        if (!available.find(a => a.zoneId === z.zoneId)) {
          available.push({ zoneId: z.zoneId, zoneName: z.zoneName });
        }
      }
    });
  });

  // Determine which zones to show columns for
  let showZones = [];
  if (schoolZone === 'all') {
    showZones = available;
  } else if (detailCompareZones.length > 0) {
    showZones = available.filter(z => detailCompareZones.includes(z.zoneId));
    if (showZones.length === 0) showZones = available.slice(0, 2);
  } else {
    showZones = available.filter(z => z.zoneId === schoolZone);
    const other = available.find(z => z.zoneId !== schoolZone);
    if (other) showZones.push(other);
    if (showZones.length === 0) showZones = available.slice(0, 1);
  }

  // Build columns
  const cols = showZones.map(z => {
    const robot = (() => {
      for (const zd of DATA.zones) {
        if (zd.zoneId !== z.zoneId) continue;
        for (const t of zd.teams) {
          if (t.collegeName === schoolCollege) {
            const r = t.robots.find(r => r.type === schoolType);
            if (r) return r;
          }
        }
      }
      return null;
    })();
    const rankInfo = getFieldRank(schoolType, cfg.ladderFields[schoolType]?.field, z.zoneId, currentYear);
    return { zoneId: z.zoneId, zoneName: z.zoneName, year: currentYear, robot, rank: rankInfo.rank, total: rankInfo.total };
  });

  if (cols.length === 0) {
    el.innerHTML = '<div class="type-detail-section"><p style="color:var(--ink-mute)">无可用数据</p></div>';

    return;

  const fields = cfg.typeFields[schoolType] || [];

        ${cols.map((c, i) => `<span>${i+1}. ${esc(c.zoneName.length > 4 ? c.zoneName.slice(0,4)+'…' : c.zoneName)}</span>`).join('<span style="margin:0 2px">·</span>')}
      </div>
    ` : '';

    let mobileHtml = `
      <div class="type-detail-section">
        <div class="type-detail-header">
          <div>
            <span class="type-detail-title">${typeName}</span>
            ${rankBadge}
          </div>
        </div>
        ${available.length > 1 ? `
          <div style="margin-bottom:var(--sp-md)">
            <div class="filter-group" id="compareZoneGroup">
              <span class="filter-label">赛区</span>
              ${available.map(z => `<button class="pill${showZones.some(s=>s.zoneId===z.zoneId)?' active':''}" data-zone="${z.zoneId}" onclick="setDetailCompareZone(this)">${esc(z.zoneName)}</button>`).join('')}
            </div>
          </div>
        ` : ''}
        ${zoneLegend}
        <div class="type-detail-grid-mobile">
          ${fields.map(f => {

function openDistribution(field, zoneId) {
  const cfg = YEAR_CONFIG[currentYear];
  const robots = getRobots(zoneId, schoolType);
  const values = robots.map(r => ({ collegeName: r.collegeName, value: getRobotFieldValue(r, field, currentYear) }))
    .filter(d => d.value !== null && d.value !== undefined && typeof d.value === 'number');
  if (values.length < 2) return;

  const myEntry = values.find(d => d.collegeName === schoolCollege);
  const myValue = myEntry ? myEntry.value : null;
  const fieldLabel = FIELD_MAP[field] || field;
  const zone = DATA.zones.find(z => z.zoneId === zoneId);
  const zoneName = zone ? zone.zoneName : '';

  // Create overlay
  const overlay = document.createElement('div');
  overlay.className = 'dist-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const displayW = Math.min(600, window.innerWidth * 0.85);
  const displayH = 320;
  overlay.innerHTML = `
    <div class="dist-panel">
      <button class="dist-close" onclick="this.closest('.dist-overlay').remove()">&times;</button>
      <div class="dist-title">${esc(fieldLabel)} 分布</div>
      <div class="dist-subtitle">${esc(schoolCollege)} · ${esc(TYPE_NAMES[schoolType])} · ${esc(zoneName)} · ${values.length} 支队伍</div>
      <canvas id="distCanvas" width="${displayW*2}" height="${displayH*2}" style="width:${displayW}px;height:${displayH}px"></canvas>
    </div>
  `;
  document.body.appendChild(overlay);
  const canvas = document.getElementById('distCanvas');
  drawDistributionChart(canvas, values, myValue, fieldLabel);
}

function drawDistributionChart(canvas, values, myValue, fieldLabel) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const padL = 60, padR = 30, padT = 20, padB = 60;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  const allVals = values.map(d => d.value);
  const minVal = Math.min(...allVals);
  const maxVal = Math.max(...allVals);

  // If all values are the same, show a simple message
  if (maxVal - minVal < 0.001) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '24px D-DIN, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('所有队伍数值相同: ' + (myValue !== null ? myValue.toFixed(1) : '-'), w / 2, h / 2);
    return;
  }

  // Create bins
  const numBins = Math.min(12, Math.max(5, Math.ceil(values.length / 3)));
  const binWidth = (maxVal - minVal) / numBins;
  const bins = new Array(numBins).fill(0);
  let myBinIndex = -1;

  values.forEach(d => {
    let idx = binWidth > 0 ? Math.floor((d.value - minVal) / binWidth) : 0;
    if (idx >= numBins) idx = numBins - 1;
    bins[idx]++;
    if (myValue !== null && d.collegeName === schoolCollege) {
      myBinIndex = idx;
    }
  });

  const maxCount = Math.max(...bins, 1);
  const barW = chartW / numBins;

  // Y-axis grid lines
  const ySteps = Math.min(4, maxCount);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '20px D-DIN, Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= ySteps; i++) {
    const count = Math.round(maxCount * i / ySteps);
    const y = padT + chartH - (chartH * count / maxCount);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();
    ctx.fillText(count.toString(), padL - 10, y);
  }

  // Draw bars
  bins.forEach((count, i) => {
    const x = padL + i * barW + 2;
    const barH = chartH * count / maxCount;
    const y = padT + chartH - barH;
    const isMyBin = i === myBinIndex;

    ctx.fillStyle = isMyBin ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
    ctx.fillRect(x, y, barW - 4, barH);
    ctx.strokeStyle = isMyBin ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = isMyBin ? 2 : 1;
    ctx.strokeRect(x, y, barW - 4, barH);

    // Count label above bar
    if (count > 0) {
      ctx.fillStyle = isMyBin ? '#ffffff' : 'rgba(255,255,255,0.5)';
      ctx.font = isMyBin ? 'bold 20px D-DIN, Arial, sans-serif' : '18px D-DIN, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(count.toString(), x + (barW - 4) / 2, y - 6);
    }
  });

  // X-axis labels (bin ranges)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '18px D-DIN, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = 0; i < numBins; i++) {
    const binStart = minVal + i * binWidth;
    const x = padL + i * barW + barW / 2;
    ctx.fillText(binStart.toFixed(1), x, padT + chartH + 8);
  }
  // Last bin end label
  const lastX = padL + numBins * barW;
  ctx.fillText(maxVal.toFixed(1), lastX, padT + chartH + 8);

  // My value marker (vertical dashed line)
  if (myValue !== null) {
    const ratio = (myValue - minVal) / (maxVal - minVal);
    const mx = padL + ratio * chartW;

    ctx.setLineDash([8, 6]);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mx, padT);
    ctx.lineTo(mx, padT + chartH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Value label at the top
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px D-DIN, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(formatNum(myValue), mx, padT - 4);
  }

  // Y-axis label
  ctx.save();
  ctx.translate(16, padT + chartH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '18px D-DIN, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('队伍数', 0, 0);
  ctx.restore();
}

// ── Compare Page ──
let compareSlots = [];
let compareType = 'Infantry';
let compareHistoryTab = 'score';

function getCompareZones(year) {
  const cfg = YEAR_CONFIG[year];
  if (!cfg) return [];
  const yearData = DATA_CACHE[year];
  if (!yearData) return [];
  return yearData.zones
    .filter(z => !cfg.excludedZones.includes(z.zoneId) && z.teams.length > 0 && zoneHasData(z))
    .map(z => ({ zoneId: z.zoneId, zoneName: z.zoneName }));
}

function getCompareColleges(year, zoneId) {
  const yearData = DATA_CACHE[year];
  if (!yearData) return [];
  const cfg = YEAR_CONFIG[year];
  const colleges = [];
  yearData.zones.forEach(z => {
    if (cfg.excludedZones.includes(z.zoneId)) return;
    if (z.zoneId !== zoneId) return;
    z.teams.forEach(t => {
      if (!colleges.find(c => c.name === t.collegeName)) {
        colleges.push({ name: t.collegeName, logo: collegeLogos[t.collegeName] || t.collegeLogo || '' });
      }
    });
  });
  return colleges;
}

function getCompareRobot(year, zoneId, college, type) {
  const yearData = DATA_CACHE[year];
  if (!yearData) return null;
  for (const z of yearData.zones) {
    if (z.zoneId !== zoneId) continue;
    for (const t of z.teams) {
      if (t.collegeName !== college) continue;
      const r = t.robots.find(r => r.type === type);
      if (r) return r;
    }
  }
  return null;
}

function addCompareSlot() {
  if (compareSlots.length >= 4) return;
  const zones = getCompareZones(currentYear);
  const zoneId = zones.length > 0 ? zones[0].zoneId : '';
  const colleges = getCompareColleges(currentYear, zoneId);
  const college = colleges.length > 0 ? colleges[Math.min(compareSlots.length, colleges.length - 1)].name : '';
  compareSlots.push({ year: currentYear, zone: zoneId, college });
  renderComparePage();
}

function removeCompareSlot(idx) {
  compareSlots.splice(idx, 1);
  renderComparePage();
}

function moveCompareSlot(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= compareSlots.length) return;
  const tmp = compareSlots[idx];
  compareSlots[idx] = compareSlots[target];
  compareSlots[target] = tmp;
  renderComparePage();
}
function onCompareSlotChange(idx, field, value) {
  const slot = compareSlots[idx];
  slot[field] = value;

  if (field === 'year') {
    const zones = getCompareZones(value);
    slot.zone = zones.length > 0 ? zones[0].zoneId : '';
    const colleges = getCompareColleges(value, slot.zone);
    slot.college = colleges.length > 0 ? colleges[0].name : '';
  } else if (field === 'zone') {
    const colleges = getCompareColleges(slot.year, value);
    slot.college = colleges.length > 0 ? colleges[0].name : '';
  }

  renderComparePage();
}

function renderComparePage() {
  // Initialize with 2 default slots
  if (compareSlots.length === 0) {
    const years = YEAR_ORDER;
    for (const year of years) { loadData(year); }
    const zones = getCompareZones(currentYear);
    const z0 = zones.length > 0 ? zones[0].zoneId : '';
    const colleges = getCompareColleges(currentYear, z0);
    const c0 = colleges.length > 0 ? colleges[0].name : '';
    const c1 = colleges.length > 1 ? colleges[1].name : c0;
    compareSlots.push({ year: currentYear, zone: z0, college: c0 });
    if (colleges.length > 1) {
      compareSlots.push({ year: currentYear, zone: z0, college: c1 });
    }
  }

  // Shared type selector (centered) — show types available in selected years
  const compareTypeSet = new Set();
  compareSlots.forEach(slot => {
    const cfg = YEAR_CONFIG[slot.year];
    if (cfg) Object.keys(cfg.ladderFields || cfg.typeFields || {}).forEach(t => compareTypeSet.add(t));
  });
  if (compareType !== 'all' && !compareTypeSet.has(compareType)) {
    compareType = compareTypeSet.size > 0 ? [...compareTypeSet][0] : 'all';
  }
  const compareTypeNames = {};
  compareTypeSet.forEach(t => { compareTypeNames[t] = TYPE_NAMES[t] || t; });
  document.getElementById('compareTypeFilter').innerHTML = `
    <div class="filter-group" style="display:inline-flex">
      <span class="filter-label">兵种</span>
      ${Object.entries(compareTypeNames).map(([k,v]) => `<button class="pill${k===compareType?' active':''}" onclick="setCompareType('${k}',this)">${v}</button>`).join('')}
      <button class="pill${compareType==='all'?' active':''}" onclick="setCompareType('all',this)">全兵种</button>
    </div>
  `;

  // Render slot selectors
  const slotsEl = document.getElementById('compareSlots');
  slotsEl.innerHTML = compareSlots.map((slot, idx) => {
    const zones = getCompareZones(slot.year);
    const colleges = getCompareColleges(slot.year, slot.zone);
    const selCollege = colleges.find(c => c.name === slot.college);
    const logo = selCollege?.logo || '';
    return `<div class="compare-slot">
      ${logo ? `<img src="${esc(logo)}" class="compare-school-logo" width="28" height="28" alt="">` : ''}
      <select class="compare-select" onchange="onCompareSlotChange(${idx},'year',this.value)">
        ${YEAR_ORDER.map(y => `<option value="${y}"${y===slot.year?' selected':''}>${y}</option>`).join('')}
      </select>
      <select class="compare-select" onchange="onCompareSlotChange(${idx},'zone',this.value)">
        ${zones.map(z => `<option value="${z.zoneId}"${z.zoneId===slot.zone?' selected':''}>${z.zoneName}</option>`).join('')}
      </select>
      <select class="compare-select" onchange="onCompareSlotChange(${idx},'college',this.value)" style="min-width:180px">
        ${colleges.map(c => `<option value="${esc(c.name)}"${c.name===slot.college?' selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
      ${idx > 0 ? `<button class="compare-reorder" onclick="moveCompareSlot(${idx},-1)">↑</button>` : ''}
      ${idx < compareSlots.length - 1 ? `<button class="compare-reorder" onclick="moveCompareSlot(${idx},1)">↓</button>` : ''}
      ${compareSlots.length > 1 ? `<button class="compare-remove" onclick="removeCompareSlot(${idx})">×</button>` : ''}
    </div>`;
  }).join('');

  // Hide add button when at 4 slots
  const addBtn = document.getElementById('compareAddBtn');
  if (addBtn) addBtn.style.display = compareSlots.length >= 4 ? 'none' : '';

  renderCompareResult();
}

function setCompareType(type, el) {
  compareType = type;
  el.closest('.filter-group').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCompareResult();
}

function renderCompareResult() {
  const resultEl = document.getElementById('compareResult');

  // ── All-types radar chart mode ──
  if (compareType === 'all') {
    if (compareSlots.length < 2) {
      resultEl.innerHTML = '';
      document.getElementById('compareHistoryWrap').style.display = 'none';
      return;
    }
    const slotColors = [
      'rgba(255,255,255,1)', 'rgba(46,204,113,1)', 'rgba(52,152,219,1)',
      'rgba(231,76,60,1)', 'rgba(241,196,15,1)', 'rgba(155,89,182,1)', 'rgba(230,126,34,1)'
    ];
    const typeKeySet = new Set();
    compareSlots.forEach(slot => {
      const cfg = YEAR_CONFIG[slot.year];
      if (cfg) Object.keys(cfg.ladderFields || {}).forEach(t => typeKeySet.add(t));
    });
    const typeKeys = [...typeKeySet];
    const slotData = compareSlots.map((slot, si) => {
      const zones = getCompareZones(slot.year);
      const zn = zones.find(z => z.zoneId === slot.zone);
      const zoneName = zn?.zoneName || slot.zone;
      const typeRanks = typeKeys.map(typeKey => {
        const cfg = YEAR_CONFIG[slot.year];
        const ladderCfg = cfg?.ladderFields?.[typeKey];
        if (!ladderCfg) return { typeKey, typeName: TYPE_NAMES[typeKey], rank: '-', total: '?' };
        const ri = getFieldRank(typeKey, ladderCfg.field, slot.zone, slot.year, slot.college);
        const robot = getCompareRobot(slot.year, slot.zone, slot.college, typeKey);
        const val = robot ? getRobotFieldValue(robot, ladderCfg.field, slot.year) : null;
        return { typeKey, typeName: TYPE_NAMES[typeKey], rank: ri.rank, total: ri.total, value: val };
      });
      const label = `${slot.college} · ${zoneName} ${slot.year}`;
      return { label, color: slotColors[si % slotColors.length], typeRanks };
    });

    const cSize = Math.min(resultEl.clientWidth || 600, 600);
    resultEl.innerHTML = `
      <div class="compare-radar-wrap" style="margin-top:var(--sp-lg)">
        <div class="chart-container" id="compareRadarChart"></div>
      </div>
    `;
    initCompareRadarChart('compareRadarChart', slotData);
    renderCompareHistory();
    return;
  }

  // Collect resolved data for each slot
  const resolved = compareSlots.map(slot => {
    const robot = getCompareRobot(slot.year, slot.zone, slot.college, compareType);
    const cfg = YEAR_CONFIG[slot.year];
    const fields = cfg?.typeFields?.[compareType] || [];
    const ladderCfg = cfg?.ladderFields?.[compareType];
    let rank = '-', total = '?';
    if (robot && ladderCfg) {
      const ri = getFieldRank(compareType, ladderCfg.field, slot.zone, slot.year, slot.college);
      rank = ri.rank; total = ri.total;
    }
    const zones = getCompareZones(slot.year);
    const zn = zones.find(z => z.zoneId === slot.zone);
    return { ...slot, robot, fields, rank, total, zoneName: zn?.zoneName || slot.zone };
  });

  // Only show if at least 2 slots have data
  const validSlots = resolved.filter(s => s.robot);
  if (validSlots.length < 2) {
    resultEl.innerHTML = validSlots.length === 0 && compareSlots.every(s => !s.robot)
      ? '<p style="color:var(--ink-mute)">请至少选择两个有效的对比项</p>'
      : '';
    document.getElementById('compareHistoryWrap').style.display = 'none';
    return;
  }

  // Union of all fields
  const fieldSet = new Set();
  resolved.forEach(s => s.fields.forEach(f => fieldSet.add(f)));
  const fields = [...fieldSet];

  // Radar chart — one axis per field, ranked by field value within zone
  const slotColors = [
    'rgba(255,255,255,1)', 'rgba(46,204,113,1)', 'rgba(52,152,219,1)',
    'rgba(231,76,60,1)', 'rgba(241,196,15,1)', 'rgba(155,89,182,1)', 'rgba(230,126,34,1)'
  ];
  const radarSlotData = resolved.map((s, si) => {
    const fieldRanks = fields.map(f => {
      const ri = s.robot ? getFieldRank(compareType, f, s.zone, s.year, s.college) : { rank: '-', total: '?' };

const COMPARE_HISTORY_TABS = [
  { key: 'score', label: '积分榜', data: () => scoreHistory },
  { key: 'assessment', label: '完整形态', data: () => assessmentHistory },
  { key: 'goldcoin', label: '初始金币', data: () => goldcoinHistory },
];

function setCompareHistoryTab(tab, el) {
  compareHistoryTab = tab;
  el.closest('.filter-group').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCompareHistory();
}

function renderCompareHistory() {
  const wrap = document.getElementById('compareHistoryWrap');
  if (!wrap) return;
  if (compareSlots.length < 2) {
    wrap.style.display = 'none';
    return;
  }

  // Determine which tabs have data
  const available = COMPARE_HISTORY_TABS.filter(t => {
    const d = t.data();
    if (!d) return false;
    return compareSlots.some(slot => {
      const entries = d.schools[slot.college];
      return entries && entries.length >= 2;
    });
  });

  if (available.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  if (!available.find(t => t.key === compareHistoryTab)) {
    compareHistoryTab = available[0].key;
  }

  const activeTab = available.find(t => t.key === compareHistoryTab);
  const dataObj = activeTab.data();

  const slotColors = [
    'rgba(255,255,255,0.9)', 'rgba(46,204,113,0.9)', 'rgba(52,152,219,0.9)',
    'rgba(231,76,60,0.9)',
  ];

  // Collect entries per slot
  const slotEntries = compareSlots.map((slot, si) => {
    const entries = dataObj.schools[slot.college] || [];
    return { college: slot.college, entries, color: slotColors[si % slotColors.length] };
  }).filter(s => s.entries.length >= 2);

  if (slotEntries.length < 2) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'block';

  // Collect all years across slots
  const allYears = new Set();
  slotEntries.forEach(s => s.entries.forEach(e => allYears.add(e.year)));
  const years = [...allYears].sort();

  // Build label
  const getLabel = (e) => {
    if (activeTab.key === 'score') return `#${e.rank} ${e.score.toFixed(1)}`;
    if (activeTab.key === 'goldcoin') {
      const gc = e.goldcoin;
      return `#${e.rank} ${gc > 0 ? '+' + gc : gc}`;
    }
    return `#${e.rank}`;
  };

  // Collect all ranks for scaling
  const allRanks = [];
  slotEntries.forEach(s => s.entries.forEach(e => allRanks.push(e.rank)));
  const minRank = Math.min(...allRanks);
  const maxRank = Math.max(...allRanks);
  const rankRange = maxRank - minRank || 1;

  const minR = minRank - rankRange * 0.1;
  const maxR = Math.max(1, maxRank + rankRange * 0.1);
  const rRange = maxR - minR;

  disposeChart('compareHistory');
  wrap.innerHTML = `
    <div class="type-detail-section">
      <div class="filter-group" style="margin-bottom:var(--sp-sm)">
        ${available.map(t => `<button class="pill${t.key === compareHistoryTab ? ' active' : ''}" onclick="setCompareHistoryTab('${t.key}',this)">${t.label}</button>`).join('')}
      </div>
      <div id="compareHistoryChart" class="compare-history-chart-container"></div>
    </div>
  `;

  const chartDom = document.getElementById('compareHistoryChart');
  if (!chartDom) return;
  const chart = echarts.init(chartDom, null, { devicePixelRatio: 2 });
  chartInstances.compareHistory = chart;

  const seriesOption = slotEntries.map(slot => ({
    name: slot.college,
    type: 'line',
    data: years.map(year => {
      const entry = slot.entries.find(e => e.year === year);
      return entry ? entry.rank : null;
    }),
    connectNulls: false,
    symbol: 'circle',
    symbolSize: 8,
    lineStyle: { color: slot.color, width: 2 },
    itemStyle: { color: slot.color },
    label: {
      show: true,
      position: 'top',
      color: slot.color.replace('0.9', '0.7'),
      fontSize: 9,
      fontFamily: 'D-DIN-Bold, D-DIN, Arial, sans-serif',
      formatter: function(params) {
        const entry = slot.entries.find(e => e.year === years[params.dataIndex]);
        return entry ? getLabel(entry) : '';
      }
    },
    emphasis: {
      focus: 'series',
      label: { fontSize: 11 }
    }
  }));

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(10,10,10,0.95)',
      borderColor: '#3a3a3f',
      textStyle: { color: '#ffffff', fontFamily: 'D-DIN, Arial, sans-serif', fontSize: 12 }
    },
    legend: {
      bottom: 0,
      data: slotEntries.map(s => s.college),
      textStyle: { color: 'rgba(255,255,255,0.7)', fontSize: 10, fontFamily: 'D-DIN, Arial, sans-serif' },
      icon: 'circle',
      itemWidth: 8,
      itemHeight: 8
    },
    grid: { left: 50, right: 20, top: 30, bottom: 55 },
    xAxis: {
      type: 'category',
      data: years,
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
      axisTick: { show: false },
      axisLabel: {
        color: 'rgba(255,255,255,0.5)',
        fontSize: 11,
        fontFamily: 'D-DIN, Arial, sans-serif'
      }
    },
    yAxis: {
      type: 'value',
      inverse: true,
      min: minR,
      max: maxR,
      interval: Math.max(1, Math.ceil(rRange / 4)),
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } },
      axisLabel: {
        color: 'rgba(255,255,255,0.35)',
        fontSize: 11,
        fontFamily: 'D-DIN, Arial, sans-serif',
        formatter: function(v) { return '#' + Math.round(v); }
      }
    },
    series: seriesOption
  });
}

// ── Year Switch ──
async function setYear(year, el) {
  if (year === currentYear) return;
  showLoading();
  currentYear = year;
  // Update year pills in both filter bars
  document.querySelectorAll('.year-group').forEach(g => {
    g.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  });
  document.querySelectorAll(`.year-group .pill[data-year="${year}"]`).forEach(b => b.classList.add('active'));
  // Reset zone selections
  currentZone = 'all';
  ladderZone = 'all';
  sortField = null;
  // Set type for game stats years
  const cfg = YEAR_CONFIG[year];
  if (cfg.gameStatTypes) {
    const firstType = Object.keys(cfg.gameStatTypes)[0];
    currentType = firstType; ladderType = firstType;
  }
  else { currentType = 'Infantry'; ladderType = 'Infantry'; }
  // Load data
  DATA = await loadData(year);
  // Update hero
  document.getElementById('heroTitle').innerHTML = `RoboMaster<br>${year} 天梯榜`;
  // Re-render
  renderSummary();
  renderFilters();
  renderLadder();
  renderTable();
  hideLoading();
}
