// ── Get robots list (flattened) ──
function getRobots(zoneFilter, typeFilter) {
  const cfg = YEAR_CONFIG[currentYear];
  const robots = [];
  DATA.zones.forEach(z => {
    if (cfg.excludedZones.includes(z.zoneId)) return;
    if (!z.teams || z.teams.length === 0) return;
    if ((zoneFilter === 'all' || zoneFilter === 'subregional') && !zoneHasData(z)) return;
    if (zoneFilter === 'subregional' && !cfg.subRegionalIds.includes(z.zoneId)) return;
    else if (zoneFilter !== 'all' && zoneFilter !== 'subregional' && z.zoneId !== zoneFilter) return;
    z.teams.forEach(t => {
      t.robots.forEach(r => {
        if (typeFilter !== 'all' && r.type !== typeFilter) return;
        robots.push({
          ...r,
          zoneName: z.zoneName,
          teamName: t.name,
          collegeName: t.collegeName,
          collegeLogo: collegeLogos[t.collegeName] || t.collegeLogo || '',
        });
      });
    });
  });
  return robots;
}

// ── Ladder Board ──
function renderLadder() {
  const robots = getRobots(ladderZone, ladderType);
  const cfg = YEAR_CONFIG[currentYear].ladderFields[ladderType];

  // Infantry: rank by k + a * 0.4 (parsed from eaKDA "k/d/a" string)
  if (ladderType === 'Infantry') {
    robots.forEach(r => {
      const parts = (r.eaKDA || '0/0/0').split('/');
      const k = parseFloat(parts[0]) || 0;
      const a = parseFloat(parts[2]) || 0;
      r._ladderScore = k + a * 0.4;
    });
    robots.sort((a, b) => (b._ladderScore || 0) - (a._ladderScore || 0));
  } else if (ASC_FIELDS.has(cfg.field)) {
    robots.sort((a, b) => (a[cfg.field] || 0) - (b[cfg.field] || 0));
  } else {
    robots.sort((a, b) => (b[cfg.field] || 0) - (a[cfg.field] || 0));
  }

  const top = robots.slice(0, 9);
  const el = document.getElementById('ladderBoard');
  document.getElementById('ladderNote').textContent = `按「${cfg.label}」排名`;
  el.innerHTML = top.map((r, i) => `
    <div class="ladder-card${i < 3 ? ' rank-' + (i+1) : ''}" data-college="${esc(r.collegeName)}" data-type="${r.type}" style="cursor:pointer">
      <div class="ladder-rank${i < 3 ? ' top3' : ''}">${i + 1}</div>
      <img class="ladder-logo" src="${esc(r.collegeLogo)}" alt="" loading="lazy" width="40" height="40" style="background:#fff;padding:2px;border-radius:50%">
      <div class="ladder-info">
        <div class="ladder-team">${esc(r.teamName)}</div>
        <div class="ladder-detail">${esc(r.collegeName)} · ${esc(r.zoneName)} · #${r.robotNumber}</div>
      </div>
      <div class="ladder-score">${formatNum(ladderType === 'Infantry' ? r._ladderScore : r[cfg.field])}</div>
    </div>
  `).join('');
}

// ── Data Table ──
function renderMobileCards() {
  const robots = getRobots(currentZone, currentType);
  const typeFields = YEAR_CONFIG[currentYear].typeFields;
  let fields;
  if (currentType === 'all') {
    fields = ['eaKDA', 'gkDamage', 'gKillCount', 'eaSmallHitRate'];
  } else {
    fields = typeFields[currentType] || ['eaKDA'];
  }

  // Same sort logic as renderTable
  if (sortField) {
    robots.sort((a, b) => {
      let va = a[sortField], vb = b[sortField];
      if (typeof va === 'string' && va.includes('/')) {
        const pa = va.split('/'), pb = vb.split('/');
        va = (parseFloat(pa[0]) || 0) + (parseFloat(pa[2]) || 0) * 0.4;
        vb = (parseFloat(pb[0]) || 0) + (parseFloat(pb[2]) || 0) * 0.4;
      }
      return ((va || 0) - (vb || 0)) * sortDir;
    });
  } else {
    const defaultSort = fields.find(f => f !== 'eaKDA') || fields[0];
    if (ASC_FIELDS.has(defaultSort)) {
      robots.sort((a, b) => ((a[defaultSort] || 0) - (b[defaultSort] || 0)));
    } else {
      robots.sort((a, b) => ((b[defaultSort] || 0) - (a[defaultSort] || 0)));
    }
  }

  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = search
    ? robots.filter(r => r.teamName.toLowerCase().includes(search) || r.collegeName.toLowerCase().includes(search))
    : robots;

  const showZone = currentZone === 'all' && DATA.zones.filter(z => !YEAR_CONFIG[currentYear].excludedZones.includes(z.zoneId)).length > 1;

  const container = document.querySelector('#data .table-wrap') || document.querySelector('#ladder .table-wrap');
  container.innerHTML = `<div class="mobile-data-cards">${filtered.slice(0, 200).map((r, i) => `
    <div class="mobile-data-card${i < 3 ? ' top3' : ''}" data-college="${esc(r.collegeName)}" data-type="${esc(currentType)}" onclick="toggleMobileCard(this)">
      <div class="mobile-data-card-header">
        <span class="mobile-data-card-rank${i < 3 ? ' top3' : ''}">${i + 1}</span>
        <img src="${esc(r.collegeLogo)}" alt="" loading="lazy" width="32" height="32">
        <div class="mobile-data-card-name">
          <div class="mobile-data-card-team">${esc(r.teamName)}</div>
          <div class="mobile-data-card-college">${esc(r.collegeName)}${showZone ? ' · ' + esc(r.zoneName) : ''}</div>
        </div>
        <span class="mobile-data-card-arrow">▾</span>
      </div>
      <div class="mobile-data-card-details">
        ${fields.map(f => `
          <div class="mobile-data-card-detail-row">
            <span class="mobile-data-card-detail-label">${esc(FIELD_MAP[f] || f)}</span>
            <span class="mobile-data-card-detail-value">${formatNum(r[f])}</span>
          </div>
        `).join('')}
        <a class="pill mobile-data-card-detail-link" onclick="event.stopPropagation();navigateToSchool('${esc(r.collegeName)}','${esc(currentType)}','${currentYear}')">战队详情 →</a>
      </div>
    </div>
  `).join('')}</div>`;
}

function toggleMobileCard(card) {
  card.classList.toggle('expanded');
}

function renderTable() {
  if (isMobile()) { renderMobileCards(); return; }
  const robots = getRobots(currentZone, currentType);

  // Determine columns
  const typeFields = YEAR_CONFIG[currentYear].typeFields;
  let fields;
  if (currentType === 'all') {
    // Show common fields
    fields = ['eaKDA', 'gkDamage', 'gKillCount', 'eaSmallHitRate'];
  } else {
    fields = typeFields[currentType] || ['eaKDA'];
  }

  // Sort
  if (sortField) {
    robots.sort((a, b) => {
      let va = a[sortField], vb = b[sortField];
      if (typeof va === 'string' && va.includes('/')) {
        // KDA string: compute k + a * 0.4
        const pa = va.split('/');
        const pb = vb.split('/');
        va = (parseFloat(pa[0]) || 0) + (parseFloat(pa[2]) || 0) * 0.4;
        vb = (parseFloat(pb[0]) || 0) + (parseFloat(pb[2]) || 0) * 0.4;
      }
      return ((va || 0) - (vb || 0)) * sortDir;
    });
  } else {
    // Default sort by first numeric field desc (asc for ASC_FIELDS)
    const defaultSort = fields.find(f => f !== 'eaKDA') || fields[0];
    if (ASC_FIELDS.has(defaultSort)) {
      robots.sort((a, b) => ((a[defaultSort] || 0) - (b[defaultSort] || 0)));
    } else {
      robots.sort((a, b) => ((b[defaultSort] || 0) - (a[defaultSort] || 0)));
    }
  }

  // Header
  const thead = document.getElementById('tableHead');
  const showZoneCol = currentZone === 'all' && DATA.zones.filter(z => !YEAR_CONFIG[currentYear].excludedZones.includes(z.zoneId)).length > 1;
  thead.innerHTML = `<tr>
    <th style="width:48px;text-align:center">#</th>
    <th>队伍</th>
    ${showZoneCol ? '<th>赛区</th>' : ''}
    ${fields.map(f => `<th class="${sortField===f?'sorted':''}" style="text-align:right" onclick="toggleSort('${f}')">${FIELD_MAP[f]||f}<span class="sort-arrow">${sortField===f?(sortDir===1?'↑':'↓'):'↕'}</span></th>`).join('')}
  </tr>`;

  // Body
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = search
    ? robots.filter(r => r.teamName.toLowerCase().includes(search) || r.collegeName.toLowerCase().includes(search))
    : robots;

  tbody.innerHTML = filtered.slice(0, 200).map((r, i) => `<tr${i < 3 ? ' class="rank-' + (i+1) + '"' : ''} data-college="${esc(r.collegeName)}" data-type="${esc(currentType)}" style="cursor:pointer">
    <td class="rank-cell${i<3?' top3':''}">${i+1}</td>
    <td>
      <div class="team-cell">
        <img src="${esc(r.collegeLogo)}" alt="" loading="lazy" width="36" height="36" style="background:#fff;padding:2px;border-radius:50%">
        <div class="team-text">
          <div class="team-name">${esc(r.teamName)}</div>
          <div class="team-college">${esc(r.collegeName)}</div>
        </div>
      </div>
    </td>
    ${showZoneCol ? `<td style="color:var(--ink-mute);font-size:13px">${esc(r.zoneName)}</td>` : ''}
    ${fields.map(f => `<td class="num-cell${f===fields[0]?' highlight':''}">${formatNum(r[f])}</td>`).join('')}
  </tr>`).join('');
}

function toggleSort(field) {
  if (sortField === field) {
    sortDir *= -1;
  } else {
    sortField = field;
    sortDir = ASC_FIELDS.has(field) ? 1 : -1;
  }
  renderTable();
}

// ── Helpers ──
function formatNum(v) {
  if (v === undefined || v === null) return '-';
  if (typeof v === 'string') {
    if (v.includes('/')) {
      return v.split('/').map(n => parseFloat(n).toFixed(1)).join('/');
    }
    return v;
  }
  if (Number.isInteger(v)) return v.toLocaleString();
  return v.toFixed(1);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── College Name Normalization ──
const COLLEGE_RENAMES = {
  '华南理工大学广州学院': '广州城市理工学院',
  '佛山科学技术学院': '佛山大学',
  '深圳职业技术学院': '深圳职业技术大学',
  '福建工程学院': '福建理工大学',
  '中国人民解放军国防科技大学': '国防科技大学',
  '西交利物浦大学&利物浦大学': '西交利物浦大学',
  '西交利物浦大学&University of Liverpool': '西交利物浦大学',
  '合肥工业大学宣城校区': '合肥工业大学（宣城校区）',
  '桂林电子科技大学信息科技学院': '桂林信息科技学院',
  '北京理工大学（珠海）': '北京理工大学珠海学院',
};
function normCollegeName(name) {
  if (!name) return name;
  // Exact renames
  name = COLLEGE_RENAMES[name] || name;
  // Normalize half-width parens to full-width
  name = name.replace(/\(/g, '（').replace(/\)/g, '）');
  return name;
}
// Lookup helper: try normalized name first, then raw
function getHistoryData(dataObj, college) {
  if (!dataObj || !dataObj.schools) return null;
  const norm = normCollegeName(college);
  if (dataObj.schools[norm]) return dataObj.schools[norm];
  if (dataObj.schools[college]) return dataObj.schools[college];
  return null;
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', () => renderTable());

// ── Routing ──

// ── Click delegation for ladder cards & table rows ──
document.getElementById('ladderBoard').addEventListener('click', function(e) {
  const card = e.target.closest('.ladder-card[data-college]');
  if (card) navigateToSchool(card.dataset.college, card.dataset.type, currentYear);
});
document.getElementById('tableBody').addEventListener('click', function(e) {
  const row = e.target.closest('tr[data-college]');
  if (row) navigateToSchool(row.dataset.college, row.dataset.type, currentYear);
});

// ── Chart Management ──
const chartInstances = {};

function disposeChart(key) {
  if (chartInstances[key]) {
    chartInstances[key].dispose();
    delete chartInstances[key];
  }
}

// ── Mobile Helpers ──
function isMobile() {
  return window.innerWidth <= 600;
}

function toggleNav() {
  document.querySelector('.nav').classList.toggle('nav-open');
}

// Close nav when a mobile link is clicked
document.querySelector('.nav-links').addEventListener('click', function(e) {
  if (e.target.tagName === 'A') {
    document.querySelector('.nav').classList.remove('nav-open');
  }
});

// ── Orientation / Resize Handler ──
let _lastMobile = isMobile();
let _resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function() {
    // Resize all ECharts instances
    Object.values(chartInstances).forEach(c => {
      if (c && !c.isDisposed()) c.resize();
    });
    const nowMobile = isMobile();
    if (nowMobile !== _lastMobile) {
      _lastMobile = nowMobile;
      // Re-render current views that have mobile/desktop split
      if (DATA) renderTable();
      if (schoolType && document.getElementById('schoolDetail').style.display !== 'none') {
        renderTypeDetail();
        renderHistoryChart();
        renderRadarChart();
      }
      if (document.getElementById('compareSection').style.display !== 'none') {
        renderCompareResult();
        if (typeof renderCompareHistory === 'function') renderCompareHistory();
      }
    } else if (nowMobile) {
      // Same mode but canvas sizes may need updating
      if (schoolType && document.getElementById('schoolDetail').style.display !== 'none') {
        renderRadarChart();
      }
      if (document.getElementById('compareSection').style.display !== 'none') {
        renderCompareResult();
      }
    }
  }, 300);
});

// ── Init ──
init();
</script>
